# 生产环境配置
spring.application.name=accounting

# 生产数据库配置（需要修改为你的生产数据库地址）
spring.datasource.url=jdbc:mysql://你的生产数据库地址:3306/accounting?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=你的用户名
spring.datasource.password=你的密码
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.hello.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf配置（生产环境开启缓存）
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# 服务器配置
server.port=8080
server.servlet.session.timeout=30m
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 日志配置（生产环境降低日志级别）
logging.level.com.example.hello.mapper=warn
logging.level.root=info
