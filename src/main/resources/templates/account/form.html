<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(${viewMode != null and viewMode == true} ? '查看帐条' : (${account.id} ? '编辑帐条' : '新增帐条'), ~{::content})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0" th:text="${viewMode != null and viewMode == true} ? '查看帐条' : (${account.id} ? '编辑帐条' : '新增帐条')">新增帐条</h5>
            </div>
            <div class="card-body">
                <!-- 无项目提示 -->
                <div th:if="${(viewMode == null or viewMode == false) and (projects == null || projects.isEmpty())}" class="alert alert-warning">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    您暂未被分配到任何项目，无法发起记账。请联系管理员将您关联到相关项目。
                </div>
                
                <form action="/account/save" method="post" th:object="${account}" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">项目 <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{projectId}" th:disabled="${viewMode != null and viewMode == true}" required>
                                <option value="">请选择项目</option>
                                <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">收支类型 <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{type}" th:disabled="${viewMode != null and viewMode == true}" required>
                                <option value="">请选择</option>
                                <option value="1">收入</option>
                                <option value="2">支出</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">费用分类 <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{categoryId}" th:disabled="${viewMode != null and viewMode == true}" required>
                                <option value="">请选择</option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">金额 <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" th:field="*{amount}" th:disabled="${viewMode != null and viewMode == true}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">发票图片</label>
                            <!-- 查看模式：显示图片 -->
                            <div th:if="${viewMode != null and viewMode == true}" class="d-flex flex-wrap gap-2">
                                <div th:if="${account.invoiceImages != null and account.invoiceImages != ''}" th:each="imgUrl : ${#strings.arraySplit(account.invoiceImages, ',')}">
                                    <a th:href="${imgUrl}" target="_blank" class="d-inline-block border rounded p-1">
                                        <img th:src="${imgUrl}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;">
                                    </a>
                                </div>
                                <span th:if="${account.invoiceImages == null or account.invoiceImages == ''}" class="text-muted">无发票图片</span>
                            </div>
                            <!-- 编辑模式：多图上传 -->
                            <div th:if="${viewMode == null or viewMode == false}">
                                <input type="file" id="invoiceFiles" name="invoiceFiles" class="form-control" accept="image/*" multiple onchange="previewImages(this)">
                                <div class="form-text">支持多张图片，单张不超过10MB</div>
                                <!-- 图片预览区域 -->
                                <div id="imagePreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                                <!-- 已上传图片 -->
                                <div th:if="${account.invoiceImages != null and account.invoiceImages != ''}" class="d-flex flex-wrap gap-2 mt-2">
                                    <div th:each="imgUrl : ${#strings.arraySplit(account.invoiceImages, ',')}" class="position-relative">
                                        <img th:src="${imgUrl}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;">
                                        <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0" style="padding: 0 4px; font-size: 12px;" th:data-url="${imgUrl}" onclick="removeExistingImage(this)">×</button>
                                    </div>
                                </div>
                                <!-- 隐藏字段存储已有图片URL -->
                                <input type="hidden" id="existingImages" name="existingImages" th:value="${account.invoiceImages}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">备注</label>
                            <textarea class="form-control" th:field="*{remark}" th:disabled="${viewMode != null and viewMode == true}" rows="3"></textarea>
                        </div>
                    </div>
                    
                    <div th:if="${account.id != null}" class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">创建时间</label>
                            <input type="text" class="form-control" th:value="${#temporals.format(account.createTime, 'yyyy-MM-dd HH:mm:ss')}" disabled>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">修改时间</label>
                            <input type="text" class="form-control" th:value="${#temporals.format(account.updateTime, 'yyyy-MM-dd HH:mm:ss')}" disabled>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button th:if="${viewMode == null or viewMode == false}" type="submit" class="btn btn-primary">保存</button>
                        <a href="/account/list" class="btn btn-secondary">返回</a>
                    </div>
                </form>
            </div>
        </div>
        
        <script th:if="${viewMode == null or viewMode == false}">
            // 图片预览
            function previewImages(input) {
                var preview = document.getElementById('imagePreview');
                preview.innerHTML = '';
                
                if (input.files && input.files.length > 0) {
                    for (var i = 0; i < input.files.length; i++) {
                        var file = input.files[i];
                        var reader = new FileReader();
                        
                        reader.onload = function(e) {
                            var div = document.createElement('div');
                            div.className = 'position-relative';
                            div.innerHTML = '<img src="' + e.target.result + '" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">';
                            preview.appendChild(div);
                        };
                        
                        reader.readAsDataURL(file);
                    }
                }
            }
            
            // 删除已存在的图片
            function removeExistingImage(btn) {
                var url = btn.getAttribute('data-url');
                var existingInput = document.getElementById('existingImages');
                var urls = existingInput.value ? existingInput.value.split(',') : [];
                urls = urls.filter(function(u) { return u !== url; });
                existingInput.value = urls.join(',');
                btn.parentElement.remove();
            }
        </script>
    </div>
</body>
</html>
