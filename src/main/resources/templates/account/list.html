<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout('帐条管理', ~{::content})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <div class="card">
            <div class="card-header">
                <div class="d-flex flex-wrap align-items-center gap-3">
                    <form id="filterForm" class="d-flex flex-wrap align-items-center gap-3" method="get" action="/account/list">
                        <div class="d-flex align-items-center gap-2">
                            <label class="text-nowrap">项目：</label>
                            <div class="input-group input-group-sm" style="width: 160px;">
                                <select name="projectId" id="filterProjectId" class="form-select" style="border-radius: 0.25rem;" onchange="document.getElementById('filterForm').submit()">
                                    <option value="">所有项目</option>
                                    <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}" 
                                            th:selected="${projectId == p.id}"></option>
                                </select>
                                <button type="button" class="btn btn-outline-secondary" 
                                        style="border-top-left-radius: 0; border-bottom-left-radius: 0; padding: 0.25rem 0.5rem;"
                                        onclick="event.stopPropagation(); clearSelect('filterProjectId')" 
                                        th:if="${projectId != null}">
                                    <i class="bi bi-x-lg" style="font-size: 0.7rem;"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <label class="text-nowrap">状态：</label>
                            <div class="input-group input-group-sm" style="width: 140px;">
                                <select name="status" id="filterStatus" class="form-select" style="border-radius: 0.25rem;" onchange="document.getElementById('filterForm').submit()">
                                    <option value="" th:selected="${status == null}">所有状态</option>
                                    <option value="1" th:selected="${status == 1}">审批中</option>
                                    <option value="5" th:selected="${status == 5}">生效</option>
                                    <option value="12" th:selected="${status == 12}">审核未通过</option>
                                </select>
                                <button type="button" class="btn btn-outline-secondary" 
                                        style="border-top-left-radius: 0; border-bottom-left-radius: 0; padding: 0.25rem 0.5rem;"
                                        onclick="event.stopPropagation(); clearSelect('filterStatus')" 
                                        th:if="${status != null}">
                                    <i class="bi bi-x-lg" style="font-size: 0.7rem;"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <label class="text-nowrap">收支类型：</label>
                            <div class="input-group input-group-sm" style="width: 120px;">
                                <select name="type" id="filterType" class="form-select" style="border-radius: 0.25rem;" onchange="document.getElementById('filterForm').submit()">
                                    <option value="">所有</option>
                                    <option value="1" th:selected="${type == 1}">收入</option>
                                    <option value="2" th:selected="${type == 2}">支出</option>
                                </select>
                                <button type="button" class="btn btn-outline-secondary" 
                                        style="border-top-left-radius: 0; border-bottom-left-radius: 0; padding: 0.25rem 0.5rem;"
                                        onclick="event.stopPropagation(); clearSelect('filterType')" 
                                        th:if="${type != null}">
                                    <i class="bi bi-x-lg" style="font-size: 0.7rem;"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <label class="text-nowrap">记账人：</label>
                            <div class="input-group input-group-sm" style="width: 140px;">
                                <input type="text" name="creatorName" id="filterCreatorName" class="form-control" 
                                       style="border-radius: 0.25rem 0 0 0.25rem;" placeholder="输入姓名" 
                                       th:value="${creatorName}">
                                <button type="button" class="btn btn-outline-secondary" 
                                        style="border-top-left-radius: 0; border-bottom-left-radius: 0; padding: 0.25rem 0.5rem;"
                                        onclick="event.stopPropagation(); clearInput('filterCreatorName')">
                                    <i class="bi bi-x-lg" style="font-size: 0.7rem;"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <label class="text-nowrap">时间范围：</label>
                            <div class="input-group input-group-sm" style="width: 130px;">
                                <select name="timeRange" id="filterTimeRange" class="form-select" style="border-radius: 0.25rem;" onchange="document.getElementById('filterForm').submit()">
                                    <option value="" th:selected="${timeRange == null || timeRange == ''}">全部</option>
                                    <option value="week" th:selected="${timeRange == 'week'}">最近一周</option>
                                    <option value="month" th:selected="${timeRange == 'month'}">最近一月</option>
                                    <option value="quarter" th:selected="${timeRange == 'quarter'}">最近三个月</option>
                                    <option value="halfYear" th:selected="${timeRange == 'halfYear'}">最近半年</option>
                                    <option value="year" th:selected="${timeRange == 'year'}">最近一年</option>
                                    <option value="twoYears" th:selected="${timeRange == 'twoYears'}">最近2年</option>
                                    <option value="threeYears" th:selected="${timeRange == 'threeYears'}">最近3年</option>
                                </select>
                                <button type="button" class="btn btn-outline-secondary" 
                                        style="border-top-left-radius: 0; border-bottom-left-radius: 0; padding: 0.25rem 0.5rem;"
                                        onclick="event.stopPropagation(); clearSelect('filterTimeRange')" 
                                        th:if="${timeRange != null and timeRange != ''}">
                                    <i class="bi bi-x-lg" style="font-size: 0.7rem;"></i>
                                </button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('filterForm').submit()">
                            <i class="bi bi-search"></i> 查询
                        </button>
                    </form>
                    <button type="button" class="btn btn-primary btn-sm ms-auto"
                            onclick="openAddAccountModal()">
                        <i class="bi bi-plus"></i> 新增帐条
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover table-sm">
                        <thead>
                            <tr>
                                <th style="min-width: 100px; white-space: nowrap;">项目</th>
                                <th style="min-width: 70px; white-space: nowrap;">记账人</th>
                                <th style="min-width: 80px; white-space: nowrap;">收支类型</th>
                                <th style="min-width: 90px; white-space: nowrap;">费用分类</th>
                                <th style="min-width: 80px; white-space: nowrap;">发票</th>
                                <th style="min-width: 100px; white-space: nowrap;">状态</th>
                                <th style="min-width: 80px; white-space: nowrap;">金额</th>
                                <th style="min-width: 120px; max-width: 200px; white-space: nowrap;">备注</th>
                                <th style="min-width: 130px; white-space: nowrap;">创建时间</th>
                                <th style="min-width: 200px; white-space: nowrap;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="acc : ${accounts}">
                                <td th:text="${acc.projectName}" style="white-space: nowrap;"></td>
                                <td th:text="${acc.creatorName}" style="white-space: nowrap;"></td>
                                <td style="white-space: nowrap;">
                                    <span th:if="${acc.type == 1}" class="badge bg-success">收入</span>
                                    <span th:if="${acc.type == 2}" class="badge bg-danger">支出</span>
                                </td>
                                <td th:text="${acc.categoryName != null and acc.categoryName != ''} ? ${acc.categoryName} : '-'" style="white-space: nowrap;">-</td>
                                <td style="white-space: nowrap;">
                                    <button th:if="${acc.invoiceImages != null && !acc.invoiceImages.isEmpty()}" 
                                            class="btn btn-outline-info btn-sm" 
                                            style="white-space: nowrap; min-width: 80px;"
                                            th:onclick="'showInvoiceImages(' + ${acc.id} + ')'">
                                        <i class="bi bi-images"></i> 票据<span th:if="${#strings.arraySplit(acc.invoiceImages, ',').length > 1}" th:text="'(' + ${#strings.arraySplit(acc.invoiceImages, ',').length} + ')'"></span>
                                    </button>
                                    <span th:if="${acc.invoiceImages == null || acc.invoiceImages.isEmpty()}">-</span>
                                </td>
                                <td>
                                    <!-- 待管理员审批 -->
                                    <div th:if="${acc.status == 1 and acc.approvalStage == 1}">
                                        <span class="badge bg-warning">待管理员审批</span>
                                        <!-- 显示项目管理员审批人 -->
                                        <div class="mt-1" th:if="${acc.pendingApproverNames != null and !acc.pendingApproverNames.isEmpty()}">
                                            <small class="text-muted">
                                                <i class="bi bi-people-fill me-1"></i>待 <span th:text="${acc.pendingApproverNames}"></span> 审批
                                            </small>
                                        </div>
                                    </div>
                                    <!-- 待BOSS审批 -->
                                    <div th:if="${acc.status == 1 and acc.approvalStage == 2}">
                                        <span class="badge bg-info">待BOSS审批</span>
                                        <!-- 审批人信息 -->
                                        <div class="mt-1" th:if="${acc.pendingApproverNames != null and !acc.pendingApproverNames.isEmpty()}">
                                            <small class="text-muted">
                                                <i class="bi bi-people-fill me-1"></i>待 <span th:text="${acc.pendingApproverNames}"></span> 审批
                                            </small>
                                        </div>
                                    </div>
                                    <!-- 其他状态 -->
                                    <span th:if="${acc.status == 5}" class="badge bg-success">生效中，已锁定</span>
                                    <span th:if="${acc.status == 12}" class="badge bg-danger">审核未通过</span>
                                </td>
                                <td th:text="${acc.amount}" style="white-space: nowrap;"></td>
                                <td style="max-width: 200px;">
                                    <span th:if="${acc.remark != null and !acc.remark.isEmpty()}" 
                                          th:text="${acc.remark.length() > 15 ? acc.remark.substring(0, 15) + '...' : acc.remark}"
                                          th:title="${acc.remark}"
                                          style="cursor: pointer;"></span>
                                    <span th:if="${acc.remark == null or acc.remark.isEmpty()}">-</span>
                                </td>
                                <td th:text="${#temporals.format(acc.createTime, 'yyyy-MM-dd HH:mm')}" style="white-space: nowrap;"></td>
                                <td>
                                    <!-- 预览按钮：始终显示，用于查看详情（所有状态都可见） -->
                                    <button class="btn btn-outline-primary btn-sm" th:onclick="'openViewModal(' + ${acc.id} + ')'">
                                        <i class="bi bi-eye"></i> 预览
                                    </button>
                                    
                                    <!-- 编辑按钮：状态为审核未通过(12) + 是自己的帐条 -->
                                    <button th:if="${acc.status == 12 and acc.creatorId == currentUser.id}" 
                                            class="btn btn-outline-warning btn-sm ms-1" th:onclick="'openEditModal(' + ${acc.id} + ')'">
                                        <i class="bi bi-pencil"></i> 编辑
                                    </button>
                                                                    
                                    <!-- 撤销按钮：状态为审批中 (1) 且是自己的帐条 -->
                                    <button th:if="${acc.status == 1 && acc.creatorId == currentUser.id}" 
                                            class="btn btn-outline-secondary btn-sm ms-1" th:onclick="'revoke(' + ${acc.id} + ')'">
                                        <i class="bi bi-x-circle"></i> 撤销
                                    </button>
                                                                    
                                    <!-- 通过按钮：状态为审批中 (1) 且当前用户有审批权限 -->
                                    <button th:if="${acc.status == 1 and acc.canApprove}" 
                                            class="btn btn-outline-success btn-sm ms-1" 
                                            th:onclick="'approve(' + ${acc.id} + ', true, ' + ${acc.approvalStage != null ? acc.approvalStage : 1} + ')'">
                                        <i class="bi bi-check-circle"></i> 通过
                                    </button>
                                                                    
                                    <!-- 拒绝按钮：状态为审批中 (1) 且当前用户有审批权限 -->
                                    <button th:if="${acc.status == 1 and acc.canApprove}" 
                                            class="btn btn-outline-danger btn-sm ms-1" 
                                            th:onclick="'approve(' + ${acc.id} + ', false, ' + ${acc.approvalStage != null ? acc.approvalStage : 1} + ')'">
                                        <i class="bi bi-x-circle"></i> 拒绝
                                    </button>
                                    
                                    <!-- 日志按钮：始终显示 -->
                                    <button class="btn btn-outline-info btn-sm ms-1" th:onclick="'showLogModal(' + ${acc.id} + ')'">
                                        <i class="bi bi-journal-text"></i> 日志
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <!-- 分页 -->
                    <nav th:if="${totalPages > 1}" class="mt-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="text-muted small">
                                共 <span th:text="${totalCount}">0</span> 条记录
                            </div>
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/account/list(projectId=${projectId},status=${status},type=${type},creatorName=${creatorName},timeRange=${timeRange},page=${currentPage - 1})}">上一页</a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/account/list(projectId=${projectId},status=${status},type=${type},creatorName=${creatorName},timeRange=${timeRange},page=${i})}" th:text="${i}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                                    <a class="page-link" th:href="@{/account/list(projectId=${projectId},status=${status},type=${type},creatorName=${creatorName},timeRange=${timeRange},page=${currentPage + 1})}">下一页</a>
                                </li>
                            </ul>
                        </div>
                    </nav>
                </div>
            </div>
        </div>
        
        <!-- 通用提示弹窗 -->
        <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true" style="z-index: 99999;" data-bs-backdrop="false">
            <div class="modal-dialog" style="max-width: 350px; margin-top: 80px;">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header py-2 bg-primary text-white">
                        <h6 class="modal-title fw-bold" id="alertModalTitle">提示</h6>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <p class="mb-0" id="alertModalContent"></p>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-outline-primary btn-sm" data-bs-dismiss="modal">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 确认弹窗 -->
        <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true" style="z-index: 99999;" data-bs-backdrop="false">
            <div class="modal-dialog" style="max-width: 350px; margin-top: 80px;">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header py-2 bg-warning text-dark">
                        <h6 class="modal-title fw-bold" id="confirmModalTitle">确认</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <p class="mb-0" id="confirmModalContent"></p>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-outline-danger btn-sm" id="confirmModalBtn">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 审批弹窗 -->
        <div class="modal fade" id="approveModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold" id="approveModalTitle">审批</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <input type="hidden" id="approveAccountId">
                        <input type="hidden" id="approveAction">
                        <div class="mb-3" id="approveRemarkContainer" style="display: none;">
                            <label class="form-label fw-bold">拒绝原因</label>
                            <textarea class="form-control form-control-sm" id="approveRemark" rows="3" placeholder="请输入拒绝原因（选填）"></textarea>
                        </div>
                        <div class="text-center" id="approveConfirmText">
                            <p class="mb-0">确定要通过该帐条吗？</p>
                        </div>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary btn-sm" id="approveSubmitBtn" onclick="submitApprove()">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 预览弹窗（只读） -->
        <div class="modal fade" id="viewAccountModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold">帐条详情</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <div class="mb-2">
                            <label class="fw-bold text-nowrap mb-1" style="font-size: 14px;">项目</label>
                            <input type="text" class="form-control form-control-sm" id="viewProjectName" readonly>
                        </div>
                        <div class="mb-2">
                            <label class="fw-bold text-nowrap mb-1" style="font-size: 14px;">收支类型</label>
                            <input type="text" class="form-control form-control-sm" id="viewType" readonly>
                        </div>
                        <div class="mb-2">
                            <label class="fw-bold text-nowrap mb-1" style="font-size: 14px;">费用分类</label>
                            <input type="text" class="form-control form-control-sm" id="viewCategoryName" readonly>
                        </div>
                        <div class="mb-2">
                            <label class="fw-bold text-nowrap mb-1" style="font-size: 14px;">金额</label>
                            <input type="text" class="form-control form-control-sm" id="viewAmount" readonly>
                        </div>
                        <div class="mb-2">
                            <label class="fw-bold text-nowrap mb-1" style="font-size: 14px;">记账人</label>
                            <input type="text" class="form-control form-control-sm" id="viewCreatorName" readonly>
                        </div>
                        <div class="mb-2">
                            <label class="fw-bold text-nowrap mb-1" style="font-size: 14px;">状态</label>
                            <input type="text" class="form-control form-control-sm" id="viewStatus" readonly>
                        </div>
                        <div class="mb-2">
                            <label class="fw-bold text-nowrap mb-1" style="font-size: 14px;">备注</label>
                            <textarea class="form-control form-control-sm" id="viewRemark" rows="2" readonly></textarea>
                        </div>
                        <div class="mb-2">
                            <label class="fw-bold text-nowrap mb-1" style="font-size: 14px;">发票图片</label>
                            <div id="viewInvoiceImages" class="d-flex flex-wrap gap-2"></div>
                        </div>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">关闭</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 日志弹窗 -->
        <div class="modal fade" id="logModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 600px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold">操作日志</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <div class="table-responsive">
                            <table class="table table-sm table-striped">
                                <thead>
                                    <tr>
                                        <th>时间</th>
                                        <th>操作人</th>
                                        <th>操作类型</th>
                                        <th>备注</th>
                                    </tr>
                                </thead>
                                <tbody id="logTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">关闭</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 新增帐条弹窗 -->
        <div class="modal fade" id="addAccountModal" tabindex="-1" aria-hidden="true" th:fragment="addModal">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold">新增帐条</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <form id="addAccountForm" onsubmit="return false;" enctype="multipart/form-data" action="javascript:void(0)">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">项目<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" name="projectId" id="projectId" required style="flex: 1;">
                                    <option value="">请选择项目</option>
                                    <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"></option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">收支类型<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" name="type" id="type" required style="flex: 1;">
                                    <option value="">请选择</option>
                                    <option th:if="${session.currentUser != null and (session.currentUser.boss or session.currentUser.roleCode == 'admin')}" value="1">收入</option>
                                    <option value="2">支出</option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">费用分类<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" name="categoryId" id="categoryId" required style="flex: 1;">
                                    <option value="">请选择</option>
                                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">金额<span class="text-danger">*</span></label>
                                <input type="number" step="0.01" class="form-control form-control-sm" name="amount" id="amount" required style="flex: 1;">
                            </div>
                            
                            <div class="d-flex align-items-start gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 mt-1" style="min-width: 70px; font-size: 14px;">备注</label>
                                <textarea class="form-control form-control-sm" name="remark" id="remark" rows="2" style="flex: 1;"></textarea>
                            </div>
                            
                            <div class="d-flex align-items-start gap-2">
                                <label class="fw-bold text-nowrap mb-0 mt-1" style="min-width: 70px; font-size: 14px;">发票</label>
                                <div style="flex: 1;">
                                    <input type="file" class="form-control form-control-sm" name="invoiceFiles" id="invoiceFiles" accept="image/*" multiple onchange="previewAddImages(this)">
                                    <div class="form-text" style="font-size: 12px;">支持多张图片，单张不超过10MB</div>
                                    <div id="addImagePreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary btn-sm" onclick="submitAddForm()">保存</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 编辑帐条弹窗 -->
        <div class="modal fade" id="editAccountModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold">编辑帐条</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <form id="editAccountForm" onsubmit="return false;" enctype="multipart/form-data" action="javascript:void(0)">
                            <input type="hidden" name="id" id="editId">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">项目<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" name="projectId" id="editProjectId" required style="flex: 1;">
                                    <option value="">请选择项目</option>
                                    <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"></option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">收支类型<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" name="type" id="editType" required style="flex: 1;">
                                    <option value="">请选择</option>
                                    <option value="1">收入</option>
                                    <option value="2">支出</option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">费用分类<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" name="categoryId" id="editCategoryId" required style="flex: 1;">
                                    <option value="">请选择</option>
                                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">金额<span class="text-danger">*</span></label>
                                <input type="number" step="0.01" class="form-control form-control-sm" name="amount" id="editAmount" required style="flex: 1;">
                            </div>
                            
                            <div class="d-flex align-items-start gap-2">
                                <label class="fw-bold text-nowrap mb-0 mt-1" style="min-width: 70px; font-size: 14px;">备注</label>
                                <textarea class="form-control form-control-sm" name="remark" id="editRemark" rows="2" style="flex: 1;"></textarea>
                            </div>
                            
                            <div class="d-flex align-items-start gap-2 mt-2">
                                <label class="fw-bold text-nowrap mb-0 mt-1" style="min-width: 70px; font-size: 14px;">发票</label>
                                <div style="flex: 1;">
                                    <input type="file" class="form-control form-control-sm" name="invoiceFiles" id="editInvoiceFiles" accept="image/*" multiple onchange="previewEditImages(this)">
                                    <div class="form-text" style="font-size: 12px;">支持多张图片，单张不超过10MB</div>
                                    <div id="editImagePreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                                    <!-- 隐藏字段存储已有的发票图片URL -->
                                    <input type="hidden" name="existingImages" id="editExistingImages">
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary btn-sm" onclick="submitEditForm()">保存</button>
                    </div>
                </div>
            </div>
        </div>
        
        <script th:inline="javascript">
            // 一级分类数据
            var level1Categories = /*[[${level1Categories}]]*/ [];
            
            // 清空单个选择框
            function clearSelect(selectId) {
                document.getElementById(selectId).value = '';
                document.getElementById('filterForm').submit();
            }
            
            // 清空输入框
            function clearInput(inputId) {
                document.getElementById(inputId).value = '';
                document.getElementById('filterForm').submit();
            }
            
            // 清空所有筛选条件
            function clearAllFilters() {
                document.getElementById('filterProjectId').value = '';
                document.getElementById('filterStatus').value = '';
                document.getElementById('filterType').value = '';
                document.getElementById('filterCreatorName').value = '';
                document.getElementById('filterForm').submit();
            }
            
            // 提交表单
            var isSubmitting = false;
            
            function submitAddForm() {
                if (isSubmitting) return;
                
                // 前端校验必填项
                var projectId = document.getElementById('projectId').value;
                var type = document.getElementById('type').value;
                var categoryId = document.getElementById('categoryId').value;
                var amount = document.getElementById('amount').value;
                
                var missingFields = [];
                if (!projectId) missingFields.push('项目');
                if (!type) missingFields.push('收支类型');
                if (!categoryId) missingFields.push('费用分类');
                if (!amount) missingFields.push('金额');
                
                if (missingFields.length > 0) {
                    showAlertModal('请完善信息', '以下必填项未填写：' + missingFields.join('、'), true);
                    return;
                }
                
                isSubmitting = true;
                // 禁用保存按钮，防止重复提交
                var saveBtn = document.querySelector('#addAccountModal .btn-primary');
                if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中...'; }
                
                var form = document.getElementById('addAccountForm');
                var formData = new FormData(form);
                
                fetch('/account/save', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // 保存成功，关闭弹窗并刷新列表
                        bootstrap.Modal.getInstance(document.getElementById('addAccountModal')).hide();
                        window.location.reload();
                    } else {
                        showAlertModal('保存失败', data.message || '保存失败，请重试');
                        isSubmitting = false;
                        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
                    }
                })
                .catch(error => {
                    showAlertModal('保存失败', '网络错误：' + error.message);
                    isSubmitting = false;
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
                });
            }
            
            // 弹窗关闭时重置表单
            document.getElementById('addAccountModal').addEventListener('hidden.bs.modal', function () {
                document.getElementById('addAccountForm').reset();
                document.getElementById('addImagePreview').innerHTML = '';
                isSubmitting = false;
                var saveBtn = document.querySelector('#addAccountModal .btn-primary');
                if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
            });
            
            // 彻底阻止表单原生提交（防止回车键或浏览器触发跳转）
            document.getElementById('addAccountForm').addEventListener('submit', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            });
            document.getElementById('editAccountForm').addEventListener('submit', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            });
            
            // 打开新增帐条弹窗
            function openAddAccountModal() {
                // 获取当前筛选的项目ID
                var filterProjectId = document.getElementById('filterProjectId').value;
                
                // 如果有筛选项目，则设置默认值
                if (filterProjectId) {
                    document.getElementById('projectId').value = filterProjectId;
                } else {
                    document.getElementById('projectId').value = '';
                }
                
                // 打开弹窗
                new bootstrap.Modal(document.getElementById('addAccountModal')).show();
            }
            
            // 打开编辑弹窗
            function openEditModal(id) {
                // 获取帐条详情
                fetch('/account/detail/' + id)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            document.getElementById('editId').value = data.account.id;
                            document.getElementById('editProjectId').value = data.account.projectId;
                            document.getElementById('editType').value = data.account.type;
                            document.getElementById('editCategoryId').value = data.account.categoryId;
                            document.getElementById('editAmount').value = data.account.amount;
                            document.getElementById('editRemark').value = data.account.remark || '';
                            
                            // 清空文件选择
                            document.getElementById('editInvoiceFiles').value = '';
                            
                            // 显示已有发票图片
                            var previewContainer = document.getElementById('editImagePreview');
                            previewContainer.innerHTML = '';
                            var existingImagesInput = document.getElementById('editExistingImages');
                            
                            if (data.account.invoiceImages && data.account.invoiceImages.length > 0) {
                                existingImagesInput.value = data.account.invoiceImages;
                                var images = data.account.invoiceImages.split(',');
                                images.forEach(function(url) {
                                    if (url.trim()) {
                                        var imgDiv = document.createElement('div');
                                        imgDiv.style.position = 'relative';
                                        imgDiv.innerHTML = '<img src="' + url.trim() + '" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">' +
                                            '<button type="button" class="btn btn-danger btn-sm" style="position: absolute; top: -5px; right: -5px; padding: 0 4px; font-size: 10px;" onclick="removeEditImage(this, \'' + url.trim() + '\')">×</button>';
                                        previewContainer.appendChild(imgDiv);
                                    }
                                });
                            } else {
                                existingImagesInput.value = '';
                            }
                            
                            new bootstrap.Modal(document.getElementById('editAccountModal')).show();
                        } else {
                            showAlertModal('错误', data.message || '获取帐条详情失败');
                        }
                    })
                    .catch(error => {
                        showAlertModal('错误', '获取帐条详情失败：' + error.message);
                    });
            }
            
            // 打开预览弹窗（只读）
            function openViewModal(id) {
                // 获取帐条详情
                fetch('/account/detail/' + id)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            var account = data.account;
                            document.getElementById('viewProjectName').value = account.projectName || '-';
                            document.getElementById('viewType').value = account.type == 1 ? '收入' : '支出';
                            document.getElementById('viewCategoryName').value = account.categoryName || '-';
                            document.getElementById('viewAmount').value = account.amount ? '¥' + account.amount : '-';
                            document.getElementById('viewCreatorName').value = account.creatorName || '-';
                            document.getElementById('viewStatus').value = account.statusText || '-';
                            document.getElementById('viewRemark').value = account.remark || '';
                            
                            // 显示发票图片
                            var imagesContainer = document.getElementById('viewInvoiceImages');
                            imagesContainer.innerHTML = '';
                            if (account.invoiceImages && account.invoiceImages.length > 0) {
                                var images = account.invoiceImages.split(',');
                                images.forEach(function(url) {
                                    if (url.trim()) {
                                        var imgDiv = document.createElement('div');
                                        // 修复 HTTP 为 HTTPS
                                        var fixedUrl = url.trim();
                                        if (fixedUrl.startsWith('http:')) {
                                            fixedUrl = fixedUrl.replace('http:', 'https:');
                                        }
                                        imgDiv.innerHTML = '<img src="' + fixedUrl + '" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; cursor: pointer;" onclick="showLargeImage(\'' + fixedUrl + '\')">';
                                        imagesContainer.appendChild(imgDiv);
                                    }
                                });
                            } else {
                                imagesContainer.innerHTML = '<span class="text-muted">无发票图片</span>';
                            }
                            
                            new bootstrap.Modal(document.getElementById('viewAccountModal')).show();
                        } else {
                            showAlertModal('错误', data.message || '获取帐条详情失败');
                        }
                    })
                    .catch(error => {
                        showAlertModal('错误', '获取帐条详情失败：' + error.message);
                    });
            }
            
            // 提交编辑表单
            function submitEditForm() {
                if (isSubmitting) return;
                
                // 前端校验必填项
                var editProjectId = document.getElementById('editProjectId').value;
                var editType = document.getElementById('editType').value;
                var editCategoryId = document.getElementById('editCategoryId').value;
                var editAmount = document.getElementById('editAmount').value;
                
                var missingFields = [];
                if (!editProjectId) missingFields.push('项目');
                if (!editType) missingFields.push('收支类型');
                if (!editCategoryId) missingFields.push('费用分类');
                if (!editAmount) missingFields.push('金额');
                
                if (missingFields.length > 0) {
                    showAlertModal('请完善信息', '以下必填项未填写：' + missingFields.join('、'), true);
                    return;
                }
                
                // 显示确认弹窗
                showConfirmModal('确认重新提交', '保存后将重新进入审批流程，确定要保存吗？', function() {
                    isSubmitting = true;
                    
                    var form = document.getElementById('editAccountForm');
                    var formData = new FormData(form);
                    
                    fetch('/account/save', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // 保存成功，关闭弹窗并立即刷新列表
                            bootstrap.Modal.getInstance(document.getElementById('editAccountModal')).hide();
                            // 强制刷新页面，清除缓存
                            window.location.href = window.location.href.split('?')[0] + '?t=' + new Date().getTime();
                        } else {
                            showAlertModal('保存失败', data.message || '保存失败，请重试');
                        }
                    })
                    .catch(error => {
                        showAlertModal('错误', '保存失败：' + error.message);
                    })
                    .finally(() => {
                        isSubmitting = false;
                    });
                });
            }
            
            // 通用提示弹窗
            // keepModals=true 时不关闭其他弹窗（用于表单校验提示）
            function showAlertModal(title, content, keepModals) {
                document.getElementById('alertModalTitle').textContent = title;
                document.getElementById('alertModalContent').textContent = content;
                if (!keepModals) {
                    // 关闭其他弹窗（不关闭弹窗自身）
                    var openModals = document.querySelectorAll('.modal.show');
                    openModals.forEach(function(m) {
                        if (m.id !== 'alertModal' && m.id !== 'confirmModal') {
                            var instance = bootstrap.Modal.getInstance(m);
                            if (instance) instance.hide();
                        }
                    });
                }
                var alertModalEl = document.getElementById('alertModal');
                var modal = new bootstrap.Modal(alertModalEl);
                modal.show();
            }
            
            // 编辑弹窗图片预览
            function previewEditImages(input) {
                var previewContainer = document.getElementById('editImagePreview');
                
                if (input.files && input.files.length > 0) {
                    Array.from(input.files).forEach(function(file) {
                        var reader = new FileReader();
                        reader.onload = function(e) {
                            var imgDiv = document.createElement('div');
                            imgDiv.style.position = 'relative';
                            imgDiv.innerHTML = '<img src="' + e.target.result + '" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">' +
                                '<span class="badge bg-success" style="position: absolute; top: -5px; right: -5px; font-size: 10px;">新</span>';
                            previewContainer.appendChild(imgDiv);
                        };
                        reader.readAsDataURL(file);
                    });
                }
            }
            
            // 删除编辑弹窗中的已有图片
            function removeEditImage(btn, imageUrl) {
                // 从DOM中移除
                btn.parentElement.remove();
                
                // 更新隐藏字段
                var existingImagesInput = document.getElementById('editExistingImages');
                var images = existingImagesInput.value.split(',').filter(function(url) {
                    return url.trim() !== imageUrl;
                });
                existingImagesInput.value = images.join(',');
            }
            
            // 通用确认弹窗
            var confirmCallback = null;
            function showConfirmModal(title, content, callback) {
                document.getElementById('confirmModalTitle').textContent = title;
                document.getElementById('confirmModalContent').textContent = content;
                confirmCallback = callback;
                var confirmModalEl = document.getElementById('confirmModal');
                var modal = new bootstrap.Modal(confirmModalEl);
                modal.show();
            }
            
            document.getElementById('confirmModalBtn').addEventListener('click', function() {
                bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
                if (confirmCallback) {
                    confirmCallback();
                    confirmCallback = null;
                }
            });
            
            // 新增记账图片预览
            function previewAddImages(input) {
                var preview = document.getElementById('addImagePreview');
                preview.innerHTML = '';
                
                if (input.files && input.files.length > 0) {
                    for (var i = 0; i < input.files.length; i++) {
                        var file = input.files[i];
                        var reader = new FileReader();
                        
                        reader.onload = function(e) {
                            var div = document.createElement('div');
                            div.className = 'position-relative';
                            div.innerHTML = '<img src="' + e.target.result + '" style="width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; cursor: pointer;" onclick="showLargeImage(\'' + e.target.result + '\')">';
                            preview.appendChild(div);
                        };
                        
                        reader.readAsDataURL(file);
                    }
                }
            }
            
            // 显示大图
            function showLargeImage(imageUrl) {
                document.getElementById('largeImage').src = imageUrl;
                var modal = new bootstrap.Modal(document.getElementById('imageModal'));
                modal.show();
            }
            
            // 查看票据图片（支持多图切换）
            var currentInvoiceImages = [];
            var currentInvoiceImageIndex = 0;
            
            function showInvoiceImages(accountId) {
                // 获取帐条详情
                fetch('/account/detail/' + accountId)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success && data.account.invoiceImages) {
                            currentInvoiceImages = data.account.invoiceImages.split(',').filter(url => url.trim());
                            currentInvoiceImageIndex = 0;
                            
                            if (currentInvoiceImages.length > 0) {
                                updateInvoiceImageViewer();
                                var modal = new bootstrap.Modal(document.getElementById('invoiceImagesModal'));
                                modal.show();
                            }
                        }
                    })
                    .catch(error => {
                        showAlertModal('错误', '获取票据图片失败：' + error.message);
                    });
            }
            
            function updateInvoiceImageViewer() {
                var viewer = document.getElementById('invoiceImageViewer');
                var counter = document.getElementById('invoiceImageCounter');
                var prevBtn = document.getElementById('prevInvoiceImage');
                var nextBtn = document.getElementById('nextInvoiceImage');
                
                // 重置缩放状态
                resetInvoiceImageTransform();
                
                // 修复 HTTP 为 HTTPS
                var imageUrl = currentInvoiceImages[currentInvoiceImageIndex].trim();
                if (imageUrl.startsWith('http:')) {
                    imageUrl = imageUrl.replace('http:', 'https:');
                }
                
                viewer.src = imageUrl;
                counter.textContent = (currentInvoiceImageIndex + 1) + ' / ' + currentInvoiceImages.length;
                
                // 控制按钮显示
                prevBtn.style.display = currentInvoiceImages.length > 1 ? 'block' : 'none';
                nextBtn.style.display = currentInvoiceImages.length > 1 ? 'block' : 'none';
            }
            
            function prevInvoiceImage() {
                if (currentInvoiceImageIndex > 0) {
                    currentInvoiceImageIndex--;
                    updateInvoiceImageViewer();
                }
            }
            
            function nextInvoiceImage() {
                if (currentInvoiceImageIndex < currentInvoiceImages.length - 1) {
                    currentInvoiceImageIndex++;
                    updateInvoiceImageViewer();
                }
            }
            
            // ===== 票据图片缩放和拖拽功能 =====
            var invoiceImageState = { scale: 1, x: 0, y: 0, isDragging: false, dragStartX: 0, dragStartY: 0 };
            
            function resetInvoiceImageTransform() {
                invoiceImageState = { scale: 1, x: 0, y: 0, isDragging: false, dragStartX: 0, dragStartY: 0 };
                updateInvoiceImageTransform();
            }
            
            function updateInvoiceImageTransform() {
                var img = document.getElementById('invoiceImageViewer');
                img.style.transform = 'translate(' + invoiceImageState.x + 'px, ' + invoiceImageState.y + 'px) scale(' + invoiceImageState.scale + ')';
            }
            
            function handleInvoiceWheel(event) {
                event.preventDefault();
                var img = document.getElementById('invoiceImageViewer');
                var rect = img.parentElement.getBoundingClientRect();
                var mouseX = event.clientX - rect.left;
                var mouseY = event.clientY - rect.top;
                
                var delta = event.deltaY > 0 ? -0.1 : 0.1;
                var newScale = invoiceImageState.scale + delta;
                if (newScale < 0.3) newScale = 0.3;
                if (newScale > 5) newScale = 5;
                
                var scaleRatio = newScale / invoiceImageState.scale;
                invoiceImageState.x = mouseX - (mouseX - invoiceImageState.x) * scaleRatio;
                invoiceImageState.y = mouseY - (mouseY - invoiceImageState.y) * scaleRatio;
                invoiceImageState.scale = newScale;
                
                updateInvoiceImageTransform();
            }
            
            function startInvoiceDrag(event) {
                event.preventDefault();
                var img = document.getElementById('invoiceImageViewer');
                invoiceImageState.isDragging = true;
                invoiceImageState.dragStartX = event.clientX - invoiceImageState.x;
                invoiceImageState.dragStartY = event.clientY - invoiceImageState.y;
                img.style.cursor = 'grabbing';
                
                function onMouseMove(e) {
                    if (!invoiceImageState.isDragging) return;
                    invoiceImageState.x = e.clientX - invoiceImageState.dragStartX;
                    invoiceImageState.y = e.clientY - invoiceImageState.dragStartY;
                    updateInvoiceImageTransform();
                }
                
                function onMouseUp() {
                    invoiceImageState.isDragging = false;
                    img.style.cursor = 'grab';
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }
            
            function downloadInvoiceImage() {
                if (currentInvoiceImages.length === 0) {
                    showAlertModal('提示', '没有可下载的图片');
                    return;
                }
                
                var imageUrl = currentInvoiceImages[currentInvoiceImageIndex].trim();
                var link = document.createElement('a');
                link.href = imageUrl;
                link.download = '票据图片_' + (currentInvoiceImageIndex + 1) + '.jpg';
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
            
            // 显示日志弹窗
            function showLogModal(accountId) {
                fetch('/accountDetail/api/list/' + accountId)
                    .then(response => response.json())
                    .then(data => {
                        var html = '';
                        if (data && data.length > 0) {
                            // 按时间倒序排序（最新的在最上面）
                            data.sort(function(a, b) {
                                return new Date(b.operateTime) - new Date(a.operateTime);
                            });
                            data.forEach(function(item) {
                                var actionTypeText = {
                                    'CREATE': '创建',
                                    'UPDATE': '更新',
                                    'SUBMIT': '发起审批',
                                    'SUBMIT_AUDIT': '提交审批',
                                    'RESUBMIT': '重新提交',
                                    'APPROVE': '通过',
                                    'REJECT': '拒绝',
                                    'REVOKE': '撤销'
                                }[item.actionType] || item.actionType;
                                
                                html += '<tr>';
                                html += '<td>' + (item.operateTime ? item.operateTime.substring(0, 16).replace('T', ' ') : '-') + '</td>';
                                html += '<td>' + (item.operatorName || '-') + '</td>';
                                html += '<td>' + actionTypeText + '</td>';
                                html += '<td>' + (item.remark || '-') + '</td>';
                                html += '</tr>';
                            });
                        } else {
                            html = '<tr><td colspan="4" class="text-center">暂无日志记录</td></tr>';
                        }
                        document.getElementById('logTableBody').innerHTML = html;
                        new bootstrap.Modal(document.getElementById('logModal')).show();
                    })
                    .catch(error => {
                        console.error('加载日志失败:', error);
                        showAlertModal('错误', '加载日志失败');
                    });
            }
            
            // 当前用户角色信息（从后端传入）
            var currentUserRole = /*[[${currentUser != null ? currentUser.roleCode : ''}]]*/ '';
            var isCurrentUserBoss = /*[[${currentUser != null && currentUser.boss}]]*/ false;
            var isCurrentUserFinance = /*[[${currentUser != null && currentUser.finance}]]*/ false;
            
            function approve(id, approved, approvalStage) {
                document.getElementById('approveAccountId').value = id;
                document.getElementById('approveAction').value = approved ? 'true' : 'false';
                document.getElementById('approveRemark').value = '';
                
                var modalTitle = document.getElementById('approveModalTitle');
                var confirmText = document.getElementById('approveConfirmText');
                var remarkContainer = document.getElementById('approveRemarkContainer');
                var submitBtn = document.getElementById('approveSubmitBtn');
                
                // 根据审批阶段和当前用户角色显示不同文案
                var stageText = '';
                if (approvalStage == 1) {
                    stageText = '管理员审批';
                } else if (approvalStage == 2) {
                    stageText = 'BOSS审批';
                }
                
                if (approved) {
                    modalTitle.textContent = '通过' + stageText;
                    
                    // 构建提示文案
                    var tipHtml = '<div class="text-center">';
                    tipHtml += '<p class="mb-2">确定要通过该帐条吗？</p>';
                    
                    // BOSS审批时显示特殊提示
                    if (approvalStage == 2 && isCurrentUserBoss) {
                        var otherBosses = [];
                        /*[# th:each="b : ${bossList}" th:if="${b.status == 1 && b.id != currentUser.id}"]
                        otherBosses.push('[[${b.name}]]');
                        /*[/]*/
                        
                        if (otherBosses.length > 0) {
                            tipHtml += '<div class="alert alert-info py-2 mb-0">';
                            tipHtml += '<small><i class="bi bi-info-circle me-1"></i>';
                            tipHtml += '待您及 ' + otherBosses.join('、') + ' 审批';
                            tipHtml += '</small></div>';
                        } else {
                            tipHtml += '<div class="alert alert-info py-2 mb-0">';
                            tipHtml += '<small><i class="bi bi-info-circle me-1"></i>待您审批</small>';
                            tipHtml += '</div>';
                        }
                    }
                    // 管理员审批时显示提示
                    else if (approvalStage == 1) {
                        tipHtml += '<div class="alert alert-warning py-2 mb-0">';
                        tipHtml += '<small><i class="bi bi-info-circle me-1"></i>';
                        tipHtml += '审批后将流转至BOSS审批';
                        tipHtml += '</small></div>';
                    }
                    
                    tipHtml += '</div>';
                    confirmText.innerHTML = tipHtml;
                    confirmText.style.display = 'block';
                    remarkContainer.style.display = 'none';
                    submitBtn.className = 'btn btn-success btn-sm';
                    submitBtn.textContent = '通过';
                } else {
                    modalTitle.textContent = '拒绝' + stageText;
                    confirmText.style.display = 'none';
                    remarkContainer.style.display = 'block';
                    submitBtn.className = 'btn btn-danger btn-sm';
                    submitBtn.textContent = '拒绝';
                }
                
                new bootstrap.Modal(document.getElementById('approveModal')).show();
            }
            
            function submitApprove() {
                var id = document.getElementById('approveAccountId').value;
                var approved = document.getElementById('approveAction').value === 'true';
                var remark = document.getElementById('approveRemark').value.trim();
                
                // 拒绝原因改为选填，不再强制校验
                
                bootstrap.Modal.getInstance(document.getElementById('approveModal')).hide();
                
                fetch('/account/approve/' + id, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'approved=' + approved + '&remark=' + encodeURIComponent(remark)
                })
                .then(response => response.text())
                .then(result => {
                    if (result === 'success') {
                        location.reload();
                    } else {
                        showAlertModal('错误', '操作失败：' + result);
                    }
                });
            }
            
            function revoke(id) {
                showConfirmModal('确认撤销', '确定要撤销该帐条吗？', function() {
                    fetch('/account/revoke/' + id, {
                        method: 'POST'
                    })
                    .then(response => response.text())
                    .then(result => {
                        if (result === 'success') {
                            location.reload();
                        } else {
                            showAlertModal('错误', '操作失败：' + result);
                        }
                    });
                });
            }
        </script>
        
        <!-- 大图展示弹窗 -->
        <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h6 class="modal-title">查看图片</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-center">
                        <img id="largeImage" src="" style="max-width: 100%; max-height: 80vh; object-fit: contain;">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 查看票据弹窗（支持多图切换、缩放、拖拽） -->
        <div class="modal fade" id="invoiceImagesModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h6 class="modal-title">查看票据</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-center">
                        <div style="display:flex;justify-content:center;gap:10px;margin-bottom:15px;">
                            <button type="button" class="btn btn-outline-success btn-sm" onclick="downloadInvoiceImage()">
                                <i class="bi bi-download"></i> 下载当前图片
                            </button>
                        </div>
                        <div class="position-relative" id="invoiceImageViewport" 
                             style="width:100%;height:60vh;overflow:hidden;background:#f5f5f5;border:1px solid #ddd;border-radius:4px;"
                             onwheel="handleInvoiceWheel(event)" onmousedown="startInvoiceDrag(event)">
                            <img id="invoiceImageViewer" src="" 
                                 style="position:absolute;left:0;top:0;transform-origin:0 0;transition:none;cursor:grab;max-width:none;"
                                 draggable="false">
                            <button id="prevInvoiceImage" class="btn btn-outline-secondary position-absolute" 
                                    style="left: 10px; top: 50%; transform: translateY(-50%); z-index:10;" 
                                    onclick="prevInvoiceImage()">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                            <button id="nextInvoiceImage" class="btn btn-outline-secondary position-absolute" 
                                    style="right: 10px; top: 50%; transform: translateY(-50%); z-index:10;" 
                                    onclick="nextInvoiceImage()">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
                        <div class="mt-3">
                            <span id="invoiceImageCounter" class="badge bg-secondary">1 / 1</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
