<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout('费用分类', ~{::content})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">费用分类列表</h5>
                <button type="button" class="btn btn-primary btn-sm"
                        th:if="${session.currentUser != null and session.currentUser.hasPermission('category:add')}"
                        onclick="openCategoryModal()">
                    <i class="bi bi-plus"></i> 新增费用分类
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th>费用分类名称</th>
                                <th style="width: 150px;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat : ${categories}">
                                <td th:text="${cat.id}"></td>
                                <td th:text="${cat.name}"></td>
                                <td style="white-space: nowrap;">
                                    <button class="btn btn-outline-primary btn-sm"
                                            th:if="${session.currentUser != null and session.currentUser.hasPermission('category:edit')}"
                                            th:onclick="'openEditCategoryModal(' + ${cat.id} + ')'"
                                            style="padding: 4px 10px; font-size: 12px;"><i class="bi bi-pencil"></i> 编辑</button>
                                    <button class="btn btn-outline-danger btn-sm ms-1"
                                            th:if="${session.currentUser != null and session.currentUser.hasPermission('category:delete')}"
                                            th:onclick="'showDeleteConfirm(' + ${cat.id} + ')'"
                                            style="padding: 4px 10px; font-size: 12px;"><i class="bi bi-trash"></i> 删除</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 提示弹窗 -->
        <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold" id="alertModalTitle">提示</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <p class="mb-0" id="alertModalContent"></p>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-primary btn-sm" data-bs-dismiss="modal">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 确认弹窗 -->
        <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold" id="confirmModalTitle">确认</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <p class="mb-0" id="confirmModalContent"></p>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-danger btn-sm" id="confirmModalBtn">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 分类新增/编辑弹窗 -->
        <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold" id="categoryModalTitle">新增费用分类</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <form id="categoryForm" action="/category/save" method="post">
                            <input type="hidden" id="categoryId" name="id" value="">
                            
                            <div class="mb-3">
                                <label class="fw-bold text-nowrap mb-2" style="font-size: 14px;">费用分类名称<span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" id="categoryName" name="name" required placeholder="请输入费用分类名称">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary btn-sm" onclick="submitCategoryForm()">保存</button>
                    </div>
                </div>
            </div>
        </div>
        
        <script th:inline="javascript">
            var categoriesData = /*[[${categories}]]*/ [];
            
            function openCategoryModal() {
                document.getElementById('categoryModalTitle').textContent = '新增费用分类';
                document.getElementById('categoryForm').reset();
                document.getElementById('categoryId').value = '';
                new bootstrap.Modal(document.getElementById('categoryModal')).show();
            }
            
            function openEditCategoryModal(id) {
                var cat = categoriesData.find(c => c.id == id);
                if (!cat) {
                    showAlertModal('错误', '未找到分类数据');
                    return;
                }
                
                document.getElementById('categoryModalTitle').textContent = '编辑费用分类';
                document.getElementById('categoryId').value = cat.id;
                document.getElementById('categoryName').value = cat.name || '';
                new bootstrap.Modal(document.getElementById('categoryModal')).show();
            }
            
            var isSubmitting = false;
            
            function submitCategoryForm() {
                if (isSubmitting) return;
                isSubmitting = true;
                
                var form = document.getElementById('categoryForm');
                var formData = new FormData(form);
                
                fetch('/category/save', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        location.reload();
                    }
                })
                .catch(error => {
                    showAlertModal('错误', '保存失败：' + error);
                    isSubmitting = false;
                });
            }
            
            // 通用提示弹窗
            function showAlertModal(title, content) {
                document.getElementById('alertModalTitle').textContent = title;
                document.getElementById('alertModalContent').textContent = content;
                new bootstrap.Modal(document.getElementById('alertModal')).show();
            }
            
            // 通用确认弹窗
            var confirmCallback = null;
            var deleteCategoryId = null;
            function showConfirmModal(title, content, callback) {
                document.getElementById('confirmModalTitle').textContent = title;
                document.getElementById('confirmModalContent').textContent = content;
                confirmCallback = callback;
                new bootstrap.Modal(document.getElementById('confirmModal')).show();
            }
            
            document.getElementById('confirmModalBtn').addEventListener('click', function() {
                bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
                if (confirmCallback) {
                    confirmCallback();
                    confirmCallback = null;
                }
            });
            
            function showDeleteConfirm(id) {
                deleteCategoryId = id;
                showConfirmModal('确认删除', '确定要删除该费用分类吗？', function() {
                    window.location.href = '/category/delete/' + deleteCategoryId;
                });
            }
        </script>
    </div>
</body>
</html>
