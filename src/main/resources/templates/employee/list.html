<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout('员工管理', ~{::content})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <script th:inline="javascript">
            var currentUserRoleCode = /*[[${session.currentUser != null ? #strings.toLowerCase(session.currentUser.roleCode) : ''}]]*/ '';
            // 页面加载时隐藏密码提示区域
            document.addEventListener('DOMContentLoaded', function() {
                var tipDiv = document.getElementById('passwordTipDiv');
                if (tipDiv) tipDiv.style.display = 'none';
            });
        </script>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="d-flex align-items-center gap-2">
                    <h5 class="mb-0">员工列表</h5>
                    <div class="d-flex align-items-center gap-2">
                        <label class="text-muted mb-0" style="font-size: 13px;">项目名称：</label>
                        <select class="form-select form-select-sm" id="projectFilter" style="width: 180px;" onchange="filterByProject()">
                            <option value="">所有项目</option>
                            <option th:each="proj : ${projects}" th:value="${proj.id}" th:text="${proj.name}" th:selected="${proj.id == selectedProjectId}"></option>
                        </select>
                    </div>
                </div>
                <button type="button" class="btn btn-outline-primary btn-sm"
                        th:if="${session.currentUser != null and !session.currentUser.roleCode.equals('employee')}"
                        onclick="openEmployeeModal()">
                    <i class="bi bi-plus"></i> 新增员工
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>姓名</th>
                                <th>身份证号</th>
                                <th>手机号</th>
                                <th>籍贯</th>
                                <th>角色</th>
                                <th>工种</th>
                                <th>隶属项目</th>
                                <th>薪资</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp : ${employees}">
                                <td th:text="${emp.id}"></td>
                                <td th:text="${emp.name}"></td>
                                <td th:text="${emp.idCard} ?: '-'" style="font-size:12px;"></td>
                                <td th:text="${emp.phone}"></td>
                                <td>
                                    <span th:if="${emp.nativeAddress}" th:text="${#strings.substring(emp.nativeAddress, 0, emp.nativeAddress.length() > 2 ? 2 : emp.nativeAddress.length())}" class="text-muted" style="font-size:12px;"></span>
                                    <span th:if="${emp.nativeAddress == null}" class="text-muted">-</span>
                                </td>
                                <td th:text="${emp.roleName}"></td>
                                <td th:text="${emp.jobCategoryName}"></td>
                                <td>
                                    <span th:if="${emp.projectNames != null}" th:text="${emp.projectNames}" class="text-primary" style="font-size:12px;"></span>
                                    <span th:if="${emp.projectNames == null}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span th:text="${emp.salaryAmount}"></span>
                                    <span th:if="${emp.salaryType == 1}">/日</span>
                                    <span th:if="${emp.salaryType == 2}">/月</span>
                                    <span th:if="${emp.salaryType == 3}">/年</span>
                                </td>
                                <td>
                                    <span th:if="${emp.status == 1}" class="badge bg-success">在职</span>
                                    <span th:if="${emp.status == 0}" class="badge bg-secondary">离职</span>
                                </td>
                                <td>
                                    <button class="btn btn-outline-primary btn-sm"
                                            th:if="${session.currentUser != null and !session.currentUser.roleCode.equals('employee')}"
                                            th:onclick="'openEditEmployeeModal(' + ${emp.id} + ')'"><i class="bi bi-pencil"></i> 编辑</button>
                                    <button class="btn btn-outline-danger btn-sm"
                                            th:if="${session.currentUser != null and !session.currentUser.roleCode.equals('employee')}"
                                            th:onclick="'showDeleteConfirm(' + ${emp.id} + ')'"><i class="bi bi-trash"></i> 删除</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 提示弹窗 -->
        <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true" style="z-index: 99999;">
            <div class="modal-dialog" style="max-width: 350px; margin-top: 80px;">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header py-2 bg-primary text-white">
                        <h6 class="modal-title fw-bold" id="alertModalTitle">提示</h6>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <p class="mb-0" id="alertModalContent"></p>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-outline-primary btn-sm" data-bs-dismiss="modal">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 确认弹窗 -->
        <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true" style="z-index: 99999;">
            <div class="modal-dialog" style="max-width: 350px; margin-top: 80px;">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header py-2 bg-warning text-dark">
                        <h6 class="modal-title fw-bold" id="confirmModalTitle">确认</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <p class="mb-0" id="confirmModalContent"></p>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-outline-danger btn-sm" id="confirmModalBtn">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 员工新增/编辑弹窗 -->
        <div class="modal fade" id="employeeModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold" id="employeeModalTitle">新增员工</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <form id="employeeForm" action="/employee/save" method="post">
                            <input type="hidden" id="employeeId" name="id">
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;">姓名<span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" id="employeeName" name="name" required style="flex: 1;">
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;">角色<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" id="employeeRoleId" name="roleId" required style="flex: 1;">
                                    <option value="">请选择角色</option>
                                    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2" id="passwordDiv">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;">密码<span class="text-danger" id="passwordRequired">*</span></label>
                                <input type="password" class="form-control form-control-sm" id="employeePassword" name="password" required style="flex: 1;">
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2" id="passwordTipDiv" style="display: none;">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;"></label>
                                <div style="flex: 1;"></div>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;">手机号<span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" id="employeePhone" name="phone" required style="flex: 1;">
                            </div>
                            
                            <!-- 身份证号 -->
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;">身份证号<span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" id="employeeIdCard" name="idCard" required style="flex: 1;" placeholder="请输入身份证号">
                            </div>
                            
                            <!-- 地址 -->
                            <div class="d-flex align-items-start gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 mt-1 text-end" style="min-width: 70px; font-size: 14px;">地址</label>
                                <div style="flex: 1;">
                                    <!-- 省市区左右排列 -->
                                    <div class="d-flex gap-2 mb-2">
                                        <select class="form-select form-select-sm" id="employeeProvince" name="province" onchange="loadCities()" style="flex: 1;">
                                            <option value="">省</option>
                                            <option value="北京市">北京市</option>
                                            <option value="天津市">天津市</option>
                                            <option value="河北省">河北省</option>
                                            <option value="山西省">山西省</option>
                                            <option value="内蒙古自治区">内蒙古</option>
                                            <option value="辽宁省">辽宁省</option>
                                            <option value="吉林省">吉林省</option>
                                            <option value="黑龙江省">黑龙江省</option>
                                            <option value="上海市">上海市</option>
                                            <option value="江苏省">江苏省</option>
                                            <option value="浙江省">浙江省</option>
                                            <option value="安徽省">安徽省</option>
                                            <option value="福建省">福建省</option>
                                            <option value="江西省">江西省</option>
                                            <option value="山东省">山东省</option>
                                            <option value="河南省">河南省</option>
                                            <option value="湖北省">湖北省</option>
                                            <option value="湖南省">湖南省</option>
                                            <option value="广东省">广东省</option>
                                            <option value="广西壮族自治区">广西</option>
                                            <option value="海南省">海南省</option>
                                            <option value="重庆市">重庆市</option>
                                            <option value="四川省">四川省</option>
                                            <option value="贵州省">贵州省</option>
                                            <option value="云南省">云南省</option>
                                            <option value="西藏自治区">西藏</option>
                                            <option value="陕西省">陕西省</option>
                                            <option value="甘肃省">甘肃省</option>
                                            <option value="青海省">青海省</option>
                                            <option value="宁夏回族自治区">宁夏</option>
                                            <option value="新疆维吾尔自治区">新疆</option>
                                        </select>
                                        <select class="form-select form-select-sm" id="employeeCity" name="city" onchange="loadDistricts()" style="flex: 1;">
                                            <option value="">市</option>
                                        </select>
                                        <select class="form-select form-select-sm" id="employeeDistrict" name="district" style="flex: 1;">
                                            <option value="">区/县</option>
                                        </select>
                                    </div>
                                    <!-- 详细地址输入框 -->
                                    <input type="text" class="form-control form-control-sm" id="employeeDetailAddress" name="detailAddress" placeholder="请输入详细地址（小区、街道等）" style="flex: 1;">
                                    <input type="hidden" id="employeeNativeAddress" name="nativeAddress">
                                </div>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;">工种<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" id="employeeJobCategoryId" name="jobCategoryId" required style="flex: 1;">
                                    <option value="">请选择工种</option>
                                    <option th:each="jc : ${jobCategories}" th:value="${jc.id}" th:text="${jc.name}"></option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;">薪资类型<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" id="employeeSalaryType" name="salaryType" required style="flex: 1;" onchange="updateSalaryLabel()">
                                    <option value="">请选择</option>
                                    <option value="1">日薪</option>
                                    <option value="2">月薪</option>
                                    <option value="3">年薪</option>
                                </select>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <label class="fw-bold text-nowrap mb-0 text-end" id="salaryAmountLabel" style="min-width: 70px; font-size: 14px;">薪资<span class="text-danger">*</span></label>
                                <div class="input-group input-group-sm" style="flex: 1;">
                                    <input type="number" step="0.01" class="form-control" id="employeeSalaryAmount" name="salaryAmount" required>
                                    <span class="input-group-text">元</span>
                                </div>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2" id="statusDiv" style="display: none;">
                                <label class="fw-bold text-nowrap mb-0 text-end" style="min-width: 70px; font-size: 14px;">状态<span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" id="employeeStatus" name="status" required style="flex: 1;">
                                    <option value="1">在职</option>
                                    <option value="0">离职</option>
                                </select>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-outline-primary btn-sm" id="saveEmployeeBtn" onclick="submitEmployeeForm()" disabled>保存</button>
                    </div>
                </div>
            </div>
        </div>
        
        <script th:inline="javascript">
            var employeesData = /*[[${employees}]]*/ [];
            
            // 实时校验表单（只控制保存按钮状态，不显示红框）
            function validateForm() {
                var employeeId = document.getElementById('employeeId').value;
                var name = document.getElementById('employeeName').value.trim();
                var roleId = document.getElementById('employeeRoleId').value;
                var phone = document.getElementById('employeePhone').value.trim();
                var idCard = document.getElementById('employeeIdCard').value.trim();
                var jobCategoryId = document.getElementById('employeeJobCategoryId').value;
                var salaryAmount = document.getElementById('employeeSalaryAmount').value.trim();
                var salaryType = document.getElementById('employeeSalaryType').value;
                var status = document.getElementById('employeeStatus').value;
                var password = document.getElementById('employeePassword').value;
                var passwordDiv = document.getElementById('passwordDiv');
                var isPasswordVisible = passwordDiv && passwordDiv.style.display !== 'none';
                var statusDiv = document.getElementById('statusDiv');
                var isStatusVisible = statusDiv && statusDiv.style.display !== 'none';
                
                // 判断是否可以保存（地址、项目非必填）
                var canSave = name && roleId && phone && idCard && jobCategoryId && salaryAmount && salaryType;
                if (isStatusVisible) {
                    canSave = canSave && status;
                }
                if (isPasswordVisible && !employeeId) {
                    canSave = canSave && password;
                }
                
                // 如果区县未选择，默认使用城市名
                var city = document.getElementById('employeeCity').value;
                var district = document.getElementById('employeeDistrict').value;
                if (!district && city) {
                    document.getElementById('employeeDistrict').value = city;
                }
                
                var saveBtn = document.getElementById('saveEmployeeBtn');
                if (canSave) {
                    saveBtn.disabled = false;
                    saveBtn.classList.remove('btn-secondary');
                    saveBtn.classList.add('btn-outline-primary');
                } else {
                    saveBtn.disabled = true;
                    saveBtn.classList.remove('btn-outline-primary');
                    saveBtn.classList.add('btn-secondary');
                }
            }
            
            // 绑定实时校验事件
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('employeeName').addEventListener('input', validateForm);
                document.getElementById('employeeRoleId').addEventListener('change', validateForm);
                document.getElementById('employeePhone').addEventListener('input', validateForm);
                document.getElementById('employeeIdCard').addEventListener('input', validateForm);
                document.getElementById('employeeProvince').addEventListener('change', validateForm);
                document.getElementById('employeeCity').addEventListener('change', validateForm);
                document.getElementById('employeeDistrict').addEventListener('change', validateForm);
                document.getElementById('employeeDetailAddress').addEventListener('input', validateForm);
                document.getElementById('employeeJobCategoryId').addEventListener('change', validateForm);
                document.getElementById('employeeSalaryAmount').addEventListener('input', validateForm);
                document.getElementById('employeeSalaryType').addEventListener('change', validateForm);
                document.getElementById('employeeStatus').addEventListener('change', validateForm);
                document.getElementById('employeePassword').addEventListener('input', validateForm);
            });
            
            // 根据薪资类型更新薪资标签文案
            function updateSalaryLabel() {
                var salaryType = document.getElementById('employeeSalaryType').value;
                var label = document.getElementById('salaryAmountLabel');
                var labelText = '薪资';
                if (salaryType == '1') {
                    labelText = '日薪';
                } else if (salaryType == '2') {
                    labelText = '月薪';
                } else if (salaryType == '3') {
                    labelText = '年薪';
                }
                label.innerHTML = labelText + '<span class="text-danger">*</span>';
            }
            
            // 省市区数据
            var cityData = {
                "北京市": ["东城区", "西城区", "朝阳区", "丰台区", "石景山区", "海淀区", "门头沟区", "房山区", "通州区", "顺义区", "昌平区", "大兴区", "怀柔区", "平谷区", "密云区", "延庆区"],
                "天津市": ["和平区", "河东区", "河西区", "南开区", "河北区", "红桥区", "东丽区", "西青区", "津南区", "北辰区", "武清区", "宝坻区", "滨海新区", "宁河区", "静海区", "蓟州区"],
                "河北省": ["石家庄市", "唐山市", "秦皇岛市", "邯郸市", "邢台市", "保定市", "张家口市", "承德市", "沧州市", "廊坊市", "衡水市"],
                "山西省": ["太原市", "大同市", "阳泉市", "长治市", "晋城市", "朔州市", "晋中市", "运城市", "忻州市", "临汾市", "吕梁市"],
                "内蒙古自治区": ["呼和浩特市", "包头市", "乌海市", "赤峰市", "通辽市", "鄂尔多斯市", "呼伦贝尔市", "巴彦淖尔市", "乌兰察布市", "兴安盟", "锡林郭勒盟", "阿拉善盟"],
                "辽宁省": ["沈阳市", "大连市", "鞍山市", "抚顺市", "本溪市", "丹东市", "锦州市", "营口市", "阜新市", "辽阳市", "盘锦市", "铁岭市", "朝阳市", "葫芦岛市"],

                "上海市": ["黄浦区", "徐汇区", "长宁区", "静安区", "普陀区", "虹口区", "杨浦区", "闵行区", "宝山区", "嘉定区", "浦东新区", "金山区", "松江区", "青浦区", "奉贤区", "崇明区"],

                "福建省": ["福州市", "厦门市", "莆田市", "三明市", "泉州市", "漳州市", "南平市", "龙岩市", "宁德市"],
                "江西省": ["南昌市", "景德镇市", "萍乡市", "九江市", "新余市", "鹰潭市", "赣州市", "吉安市", "宜春市", "抚州市", "上饶市"],

            // 加载城市列表
            function loadCities() {
                var province = document.getElementById('employeeProvince').value;
                var citySelect = document.getElementById('employeeCity');
                var districtSelect = document.getElementById('employeeDistrict');
                
                // 清空城市和区县
                citySelect.innerHTML = '<option value="">城市</option>';
                districtSelect.innerHTML = '<option value="">区/县</option>';
                
                if (province && cityData[province]) {
                    // 直辖市直接显示区县
                    if (["北京市", "天津市", "上海市", "重庆市"].includes(province)) {
                        citySelect.innerHTML = '<option value="' + province + '">' + province + '</option>';
                        citySelect.value = province;
                        loadDistricts();
                    } else {
                        cityData[province].forEach(function(city) {
                            var option = document.createElement('option');
                            option.value = city;
                            option.textContent = city;
                            citySelect.appendChild(option);
                        });
                    }
                }
                validateForm();
            }
            
            // 加载区县列表

                var province = document.getElementById('employeeProvince').value;
                var city = document.getElementById('employeeCity').value;
                var districtSelect = document.getElementById('employeeDistrict');

                districtSelect.innerHTML = '<option value="">区/县</option>';

                    // 查找城市对应的区县数据
                    var districts = districtData[city];
                    if (districts && districts.length > 0) {
                        districts.forEach(function(d) {
                            var option = document.createElement('option');
                            option.value = d;
                            option.textContent = d;
                            districtSelect.appendChild(option);
                        });

                        // 如果没有区县数据，添加默认选项
                        var defaults = ['城区', '郊区'];
                        defaults.forEach(function(d) {
                            var option = document.createElement('option');
                            option.value = d;
                            option.textContent = d;
                            districtSelect.appendChild(option);
                        });
                    }
                }
                
                // 组合完整地址
                updateNativeAddress();
                validateForm();
            }
            
            // 更新完整地址
            function updateNativeAddress() {
                var province = document.getElementById('employeeProvince').value;
                var city = document.getElementById('employeeCity').value;
                var district = document.getElementById('employeeDistrict').value;
                var detail = document.getElementById('employeeDetailAddress').value.trim();
                
                var address = '';
                if (province) address += province;
                if (city) address += city;
                if (district) address += district;
                if (detail) address += detail;
                
                document.getElementById('employeeNativeAddress').value = address;
            }
            
            // 重置项目复选框
            function resetProjectCheckboxes() {
                document.querySelectorAll('.project-checkbox').forEach(function(cb) {
                    cb.checked = false;
                });
            }
            
            // 预选项目复选框
            function setProjectCheckboxes(projectIds) {
                document.querySelectorAll('.project-checkbox').forEach(function(cb) {
                    cb.checked = projectIds && projectIds.map(String).includes(cb.value);
                });
            }
            
            function openEmployeeModal() {
                document.getElementById('employeeModalTitle').textContent = '新增员工';
                document.getElementById('employeeForm').reset();
                document.getElementById('employeeId').value = '';
                document.getElementById('employeePassword').value = '';
                document.getElementById('employeePassword').required = true;
                document.getElementById('passwordRequired').style.display = 'inline';
                document.getElementById('statusDiv').style.display = 'none';
                // 新增时显示密码输入框，隐藏提示
                document.getElementById('passwordDiv').style.display = 'flex';
                document.getElementById('passwordTipDiv').style.display = 'none';
                // 重置省市区
                document.getElementById('employeeProvince').value = '';
                document.getElementById('employeeCity').innerHTML = '<option value="">市</option>';
                document.getElementById('employeeDistrict').innerHTML = '<option value="">区/县</option>';
                document.getElementById('employeeDetailAddress').value = '';
                new bootstrap.Modal(document.getElementById('employeeModal')).show();
                // 触发校验
                validateForm();
            }
            
            function openEditEmployeeModal(id) {
                var emp = employeesData.find(e => e.id == id);
                if (!emp) return;
                
                document.getElementById('employeeModalTitle').textContent = '编辑员工';
                document.getElementById('employeeId').value = emp.id;
                document.getElementById('employeeName').value = emp.name;
                document.getElementById('employeeRoleId').value = String(emp.roleId);
                document.getElementById('employeePassword').value = '';
                document.getElementById('employeePhone').value = emp.phone || '';
                document.getElementById('employeeIdCard').value = emp.idCard || '';
                document.getElementById('employeeJobCategoryId').value = emp.jobCategoryId || '';
                document.getElementById('employeeSalaryAmount').value = emp.salaryAmount || '';
                document.getElementById('employeeSalaryType').value = emp.salaryType || 1;
                document.getElementById('employeeStatus').value = emp.status;
                document.getElementById('statusDiv').style.display = 'block';
                
                // 处理地址回显
                if (emp.nativeAddress) {
                    // 解析地址（格式：省份+城市+区县+详细地址）
                    var address = emp.nativeAddress;
                    var province = '';
                    var city = '';
                    var district = '';
                    var detail = '';
                    
                    // 尝试匹配省份
                    for (var prov in cityData) {
                        if (address.indexOf(prov) === 0) {
                            province = prov;
                            var remaining = address.substring(prov.length);
                            // 尝试匹配城市
                            for (var i = 0; i < cityData[prov].length; i++) {
                                var c = cityData[prov][i];
                                if (remaining.indexOf(c) === 0) {
                                    city = c;
                                    var remaining2 = remaining.substring(c.length);
                                    // 尝试匹配区县（从区县数据中查找）
                                    var districts = districtData[c] || [];
                                    for (var j = 0; j < districts.length; j++) {
                                        var d = districts[j];
                                        if (remaining2.indexOf(d) === 0) {
                                            district = d;
                                            detail = remaining2.substring(d.length);
                                            break;
                                        }
                                    }
                                    // 如果没匹配到区县，剩余部分作为详细地址
                                    if (!district && remaining2) {
                                        detail = remaining2;
                                    }
                                    break;
                                }
                            }
                            // 如果没匹配到城市，剩余部分作为详细地址
                            if (!city && remaining) {
                                detail = remaining;
                            }
                            break;
                        }
                    }
                    
                    document.getElementById('employeeProvince').value = province;
                    loadCities();
                    if (city) {
                        document.getElementById('employeeCity').value = city;
                        // 延迟加载区县，确保城市选择框已更新
                        setTimeout(function() {
                            loadDistricts();
                            // 如果有区县，设置区县值
                            if (district) {
                                var districtSelect = document.getElementById('employeeDistrict');
                                // 检查选项是否存在
                                var exists = false;
                                for (var i = 0; i < districtSelect.options.length; i++) {
                                    if (districtSelect.options[i].value === district) {
                                        exists = true;
                                        break;
                                    }
                                }
                                // 如果不存在，添加该选项
                                if (!exists && district) {
                                    var option = document.createElement('option');
                                    option.value = district;
                                    option.textContent = district;
                                    districtSelect.appendChild(option);
                                }
                                districtSelect.value = district;
                            }
                            // 设置详细地址
                            document.getElementById('employeeDetailAddress').value = detail;
                        }, 0);
                    } else {
                        document.getElementById('employeeDetailAddress').value = detail;
                    }
                } else {
                    document.getElementById('employeeProvince').value = '';
                    document.getElementById('employeeCity').innerHTML = '<option value="">市</option>';
                    document.getElementById('employeeDistrict').innerHTML = '<option value="">区/县</option>';
                    document.getElementById('employeeDetailAddress').value = '';
                }
                
                // 根据当前用户角色控制密码框显示
                var canEditPassword = (currentUserRoleCode === 'root' || currentUserRoleCode === 'boss');
                if (canEditPassword) {
                    // root/boss 显示密码输入框，可修改密码（留空则保持原密码）
                    document.getElementById('passwordDiv').style.display = 'flex';
                    document.getElementById('passwordTipDiv').style.display = 'none';
                    document.getElementById('employeePassword').value = '';
                    document.getElementById('employeePassword').required = false;
                    document.getElementById('passwordRequired').style.display = 'none';
                } else {
                    // 其他角色隐藏密码框，显示提示
                    document.getElementById('passwordDiv').style.display = 'none';
                    document.getElementById('passwordTipDiv').style.display = 'flex';
                }
                
                new bootstrap.Modal(document.getElementById('employeeModal')).show();
                validateForm();
            }
            
            var isSubmitting = false;
                        
            function submitEmployeeForm() {
                if (isSubmitting) return;
                            
                // 再次校验（防止绕过实时校验）
                var employeeId = document.getElementById('employeeId').value;
                var name = document.getElementById('employeeName').value.trim();
                var roleId = document.getElementById('employeeRoleId').value;
                var phone = document.getElementById('employeePhone').value.trim();
                var idCard = document.getElementById('employeeIdCard').value.trim();
                var jobCategoryId = document.getElementById('employeeJobCategoryId').value;
                var salaryAmount = document.getElementById('employeeSalaryAmount').value.trim();
                var salaryType = document.getElementById('employeeSalaryType').value;
                var status = document.getElementById('employeeStatus').value;
                var password = document.getElementById('employeePassword').value;
                var passwordDiv = document.getElementById('passwordDiv');
                var isPasswordVisible = passwordDiv && passwordDiv.style.display !== 'none';
                var statusDiv = document.getElementById('statusDiv');
                var isStatusVisible = statusDiv && statusDiv.style.display !== 'none';
                            
                var isValid = name && roleId && phone && idCard && jobCategoryId && salaryAmount && salaryType;
                if (isStatusVisible) {
                    isValid = isValid && status;
                }
                if (isPasswordVisible && !employeeId) {
                    isValid = isValid && password;
                }
                
                // 组合地址（地址为选填，有值才组合）
                var province = document.getElementById('employeeProvince').value;
                var city = document.getElementById('employeeCity').value;
                var district = document.getElementById('employeeDistrict').value;
                var detailAddress = document.getElementById('employeeDetailAddress').value.trim();
                var nativeAddress = '';
                if (province && city) {
                    nativeAddress = province + city + (district || '') + detailAddress;
                }
                document.getElementById('employeeNativeAddress').value = nativeAddress;
                            
                if (!isValid) {
                    return;
                }
                            
                isSubmitting = true;
                // 直接提交表单，避免 fetch 重定向问题
                document.getElementById('employeeForm').submit();
            }
            
            // 通用提示弹窗
            function showAlertModal(title, content) {
                document.getElementById('alertModalTitle').textContent = title;
                document.getElementById('alertModalContent').textContent = content;
                // 先关闭其他弹窗
                var openModals = document.querySelectorAll('.modal.show');
                openModals.forEach(function(m) {
                    if (m.id !== 'alertModal' && m.id !== 'confirmModal') {
                        var instance = bootstrap.Modal.getInstance(m);
                        if (instance) instance.hide();
                    }
                });
                var alertModalEl = document.getElementById('alertModal');
                var modal = new bootstrap.Modal(alertModalEl);
                modal.show();
            }
            
            // 通用确认弹窗
            var confirmCallback = null;
            var deleteEmployeeId = null;
            function showConfirmModal(title, content, callback) {
                document.getElementById('confirmModalTitle').textContent = title;
                document.getElementById('confirmModalContent').textContent = content;
                confirmCallback = callback;
                // 先关闭其他弹窗
                var openModals = document.querySelectorAll('.modal.show');
                openModals.forEach(function(m) {
                    if (m.id !== 'alertModal' && m.id !== 'confirmModal') {
                        var instance = bootstrap.Modal.getInstance(m);
                        if (instance) instance.hide();
                    }
                });
                var confirmModalEl = document.getElementById('confirmModal');
                var modal = new bootstrap.Modal(confirmModalEl);
                modal.show();
            }
            
            document.getElementById('confirmModalBtn').addEventListener('click', function() {
                bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
                if (confirmCallback) {
                    confirmCallback();
                    confirmCallback = null;
                }
            });
            
            function showDeleteConfirm(id) {
                deleteEmployeeId = id;
                showConfirmModal('确认删除', '确定要删除该员工吗？', function() {
                    window.location.href = '/employee/delete/' + deleteEmployeeId;
                });
            }
            
            // 按项目筛选员工
            function filterByProject() {
                var projectId = document.getElementById('projectFilter').value;
                if (projectId) {
                    window.location.href = '/employee/list?projectId=' + projectId;
                } else {
                    window.location.href = '/employee/list';
                }
            }
        </script>
    </div>
</body>
</html>
