<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout('工种管理', ~{::content})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">工种列表</h5>
                <button type="button" class="btn btn-primary btn-sm"
                        th:if="${session.currentUser != null and !session.currentUser.roleCode.equals('employee')}"
                        onclick="openJobCategoryModal()">
                    <i class="bi bi-plus"></i> 新增工种
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th>工种名称</th>
                                <th>薪资类型</th>
                                <th>参考薪资</th>
                                <th style="width: 150px;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="jc : ${jobCategories}">
                                <td th:text="${jc.id}"></td>
                                <td th:text="${jc.name}"></td>
                                <td>
                                    <span th:if="${jc.salaryType == 1}">日薪</span>
                                    <span th:if="${jc.salaryType == 2}">月薪</span>
                                    <span th:if="${jc.salaryType == 3}">年薪</span>
                                </td>
                                <td th:text="${jc.salaryAmount}"></td>
                                <td style="white-space: nowrap;">
                                    <button class="btn btn-outline-primary btn-sm"
                                            th:if="${session.currentUser != null and !session.currentUser.roleCode.equals('employee')}"
                                            th:onclick="'openEditJobCategoryModal(' + ${jc.id} + ')'"
                                            style="padding: 4px 10px; font-size: 12px;"><i class="bi bi-pencil"></i> 编辑</button>
                                    <button class="btn btn-outline-danger btn-sm ms-1"
                                            th:if="${session.currentUser != null and !session.currentUser.roleCode.equals('employee')}"
                                            th:onclick="'showDeleteConfirm(' + ${jc.id} + ')'"
                                            style="padding: 4px 10px; font-size: 12px;"><i class="bi bi-trash"></i> 删除</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 提示弹窗 -->
        <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
                <div class="modal-content">
                    <div class="modal-header py-2 bg-primary text-white">
                        <h6 class="modal-title fw-bold" id="alertModalTitle">提示</h6>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <p class="mb-0" id="alertModalContent"></p>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-outline-primary btn-sm" data-bs-dismiss="modal">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 确认弹窗 -->
        <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
                <div class="modal-content">
                    <div class="modal-header py-2 bg-warning text-dark">
                        <h6 class="modal-title fw-bold" id="confirmModalTitle">确认</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <p class="mb-0" id="confirmModalContent"></p>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-outline-danger btn-sm" id="confirmModalBtn">确定</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 工种新增/编辑弹窗 -->
        <div class="modal fade" id="jobCategoryModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title fw-bold" id="jobCategoryModalTitle">新增工种</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body py-3">
                        <form id="jobCategoryForm" action="/jobcategory/save" method="post">
                            <input type="hidden" id="jobCategoryId" name="id">
                            
                            <div class="mb-2">
                                <label class="form-label fw-bold">工种名称<span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="jobCategoryName" name="name" required>
                            </div>
                            
                            <div class="mb-2">
                                <label class="form-label fw-bold">薪资类型</label>
                                <select class="form-select" id="jobCategorySalaryType" name="salaryType">
                                    <option value="1">日薪</option>
                                    <option value="2">月薪</option>
                                    <option value="3">年薪</option>
                                </select>
                            </div>
                            
                            <div class="mb-2">
                                <label class="form-label fw-bold">参考薪资</label>
                                <input type="number" step="0.01" class="form-control" id="jobCategorySalaryAmount" name="salaryAmount">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="submitJobCategoryForm()">保存</button>
                    </div>
                </div>
            </div>
        </div>
        
        <script th:inline="javascript">
            var jobCategoriesData = /*[[${jobCategories}]]*/ [];
            
            function openJobCategoryModal() {
                document.getElementById('jobCategoryModalTitle').textContent = '新增工种';
                document.getElementById('jobCategoryForm').reset();
                document.getElementById('jobCategoryId').value = '';
                new bootstrap.Modal(document.getElementById('jobCategoryModal')).show();
            }
            
            function openEditJobCategoryModal(id) {
                var jc = jobCategoriesData.find(e => e.id == id);
                if (!jc) return;
                
                document.getElementById('jobCategoryModalTitle').textContent = '编辑工种';
                document.getElementById('jobCategoryId').value = jc.id;
                document.getElementById('jobCategoryName').value = jc.name;
                document.getElementById('jobCategorySalaryType').value = jc.salaryType || 1;
                document.getElementById('jobCategorySalaryAmount').value = jc.salaryAmount || '';
                
                new bootstrap.Modal(document.getElementById('jobCategoryModal')).show();
            }
            
            function submitJobCategoryForm() {
                var form = document.getElementById('jobCategoryForm');
                var formData = new FormData(form);
                
                fetch('/jobcategory/save', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        location.reload();
                    }
                })
                .catch(error => {
                    showAlertModal('错误', '保存失败：' + error);
                });
            }
            
            // 通用提示弹窗
            function showAlertModal(title, content) {
                document.getElementById('alertModalTitle').textContent = title;
                document.getElementById('alertModalContent').textContent = content;
                new bootstrap.Modal(document.getElementById('alertModal')).show();
            }
            
            // 通用确认弹窗
            var confirmCallback = null;
            function showConfirmModal(title, content, callback) {
                document.getElementById('confirmModalTitle').textContent = title;
                document.getElementById('confirmModalContent').textContent = content;
                confirmCallback = callback;
                new bootstrap.Modal(document.getElementById('confirmModal')).show();
            }
            
            document.getElementById('confirmModalBtn').addEventListener('click', function() {
                bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
                if (confirmCallback) {
                    confirmCallback();
                    confirmCallback = null;
                }
            });
            
            function showDeleteConfirm(id) {
                showConfirmModal('确认删除', '确定要删除该工种吗？', function() {
                    window.location.href = '/jobcategory/delete/' + id;
                });
            }
        </script>
    </div>
</body>
</html>
