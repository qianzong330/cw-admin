<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout('项目统计', ~{::div})}">
<head>
    <meta charset="UTF-8">
    <title>项目统计</title>
    <style>
        /* 移动端优化 */
        @media (max-width: 768px) {
            .stats-header {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 12px !important;
                padding: 12px !important;
            }
            .stats-header h5 {
                font-size: 15px;
                text-align: left;
                white-space: normal;
                line-height: 1.4;
                margin-bottom: 8px;
            }
            .stats-actions {
                display: grid !important;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 8px !important;
            }
            .stats-actions select {
                grid-column: 1 / -1;
                width: 100% !important;
                margin-bottom: 4px;
            }
            .stats-actions .btn {
                padding: 8px 4px;
                font-size: 12px;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div>
        <div class="card">
            <div class="card-header stats-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="d-flex align-items-center gap-2">
                    <a href="/index" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i> 返回首页
                    </a>
                    <h5 class="mb-0" th:text="${project.name} + ' - 收支统计'">项目统计</h5>
                </div>
                <button type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addAccountModal">
                    <i class="bi bi-plus-lg"></i> 去记账
                </button>
            </div>
            <div class="card-body">
                <!-- 统计卡片 -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card bg-success text-white">
                            <div class="card-body text-center">
                                <h6>总收入</h6>
                                <h4 th:text="'¥' + ${#numbers.formatDecimal(stats?.income ?: 0, 1, 2)}">¥0.00</h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card bg-danger text-white">
                            <div class="card-body text-center">
                                <h6>总支出</h6>
                                <h4 th:text="'¥' + ${#numbers.formatDecimal(stats?.expense ?: 0, 1, 2)}">¥0.00</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 图表和排行榜区域 -->
                <div class="row">
                    <!-- 收入TOP5分类 -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-success text-white">
                                <h6 class="mb-0"><i class="bi bi-trophy"></i> 收入TOP5分类</h6>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-sm table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-3">排名</th>
                                            <th>费用分类</th>
                                            <th class="text-end pe-3">金额</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item, iterStat : ${incomeByCategory}">
                                            <td class="ps-3">
                                                <span class="badge" th:classappend="${iterStat.index == 0} ? 'bg-warning' : (${iterStat.index == 1} ? 'bg-secondary' : (${iterStat.index == 2} ? 'bg-info' : 'bg-light text-dark'))" th:text="${iterStat.index + 1}">1</span>
                                            </td>
                                            <td th:text="${item.categoryName} ?: '未分类'">分类名</td>
                                            <td class="text-end pe-3 text-success fw-bold" th:text="'¥' + ${#numbers.formatDecimal(item.amount, 1, 2)}">¥0.00</td>
                                        </tr>
                                        <tr th:if="${incomeByCategory == null || incomeByCategory.isEmpty()}">
                                            <td colspan="3" class="text-center text-muted py-3">暂无数据</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <!-- 支出TOP5分类 -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-danger text-white">
                                <h6 class="mb-0"><i class="bi bi-trophy"></i> 支出TOP5分类</h6>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-sm table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-3">排名</th>
                                            <th>费用分类</th>
                                            <th class="text-end pe-3">金额</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item, iterStat : ${expenseByCategory}">
                                            <td class="ps-3">
                                                <span class="badge" th:classappend="${iterStat.index == 0} ? 'bg-warning' : (${iterStat.index == 1} ? 'bg-secondary' : (${iterStat.index == 2} ? 'bg-info' : 'bg-light text-dark'))" th:text="${iterStat.index + 1}">1</span>
                                            </td>
                                            <td th:text="${item.categoryName} ?: '未分类'">分类名</td>
                                            <td class="text-end pe-3 text-danger fw-bold" th:text="'¥' + ${#numbers.formatDecimal(item.amount, 1, 2)}">¥0.00</td>
                                        </tr>
                                        <tr th:if="${expenseByCategory == null || expenseByCategory.isEmpty()}">
                                            <td colspan="3" class="text-center text-muted py-3">暂无数据</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 记账明细列表 -->
                <div class="row mt-4">
                    <!-- 收入明细 -->
                    <div class="col-md-6">
                        <div class="card h-100">
                            <div class="card-header bg-success text-white">
                                <h6 class="mb-0"><i class="bi bi-arrow-up-circle me-2"></i>收入明细</h6>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-sm table-hover mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-3">金额</th>
                                                <th>费用分类</th>
                                                <th>记账人</th>
                                                <th>时间</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="item, iterStat : ${accountList}" th:if="${item.type == 'INCOME'}">
                                                <td class="ps-3 text-success fw-semibold" th:text="'¥' + ${#numbers.formatDecimal(item.amount, 1, 2)}">¥0.00</td>
                                                <td th:text="${item.categoryName} ?: '-'">费用分类</td>
                                                <td th:text="${item.creatorName} ?: '-'">记账人</td>
                                                <td th:text="${#temporals.format(item.createTime, 'yyyy-MM-dd')}">2024-01-01</td>
                                            </tr>
                                            <tr th:if="${accountList == null || accountList.isEmpty() || !accountList.?[type == 'INCOME'].size()}">
                                                <td colspan="4" class="text-center text-muted py-4">暂无收入记录</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 支出明细 -->
                    <div class="col-md-6">
                        <div class="card h-100">
                            <div class="card-header bg-danger text-white">
                                <h6 class="mb-0"><i class="bi bi-arrow-down-circle me-2"></i>支出明细</h6>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-sm table-hover mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-3">金额</th>
                                                <th>费用分类</th>
                                                <th>记账人</th>
                                                <th>时间</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="item, iterStat : ${accountList}" th:if="${item.type == 'EXPENSE'}">
                                                <td class="ps-3 text-danger fw-semibold" th:text="'¥' + ${#numbers.formatDecimal(item.amount, 1, 2)}">¥0.00</td>
                                                <td th:text="${item.categoryName} ?: '-'">费用分类</td>
                                                <td th:text="${item.creatorName} ?: '-'">记账人</td>
                                                <td th:text="${#temporals.format(item.createTime, 'yyyy-MM-dd')}">2024-01-01</td>
                                            </tr>
                                            <tr th:if="${accountList == null || accountList.isEmpty() || !accountList.?[type == 'EXPENSE'].size()}">
                                                <td colspan="4" class="text-center text-muted py-4">暂无支出记录</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 新增帐条弹窗 -->
    <div class="modal fade" id="addAccountModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title fw-bold">新增帐条</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-3">
                    <form id="addAccountForm" action="/account/save" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="source" value="project">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">项目<span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" name="projectId" id="projectId" required style="flex: 1;">
                                <option value="">请选择项目</option>
                                <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}" th:selected="${project != null && p.id == project.id}"></option>
                            </select>
                        </div>
                        
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">收支类型<span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" name="type" id="type" required style="flex: 1;">
                                <option value="">请选择</option>
                                <option value="1">收入</option>
                                <option value="2">支出</option>
                            </select>
                        </div>
                        
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">费用分类<span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" name="categoryId" id="categoryId" required style="flex: 1;">
                                <option value="">请选择</option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>
                        
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <label class="fw-bold text-nowrap mb-0" style="min-width: 70px; font-size: 14px;">金额<span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control form-control-sm" name="amount" id="amount" required style="flex: 1;">
                        </div>
                        
                        <div class="d-flex align-items-start gap-2 mb-2">
                            <label class="fw-bold text-nowrap mb-0 mt-1" style="min-width: 70px; font-size: 14px;">备注</label>
                            <textarea class="form-control form-control-sm" name="remark" id="remark" rows="2" style="flex: 1;"></textarea>
                        </div>
                        
                        <div class="d-flex align-items-start gap-2">
                            <label class="fw-bold text-nowrap mb-0 mt-1" style="min-width: 70px; font-size: 14px;">发票</label>
                            <div style="flex: 1;">
                                <input type="file" class="form-control form-control-sm" name="invoiceFiles" id="invoiceFiles" accept="image/*" multiple onchange="previewAddImages(this)">
                                <div class="form-text" style="font-size: 12px;">支持多张图片，单张不超过10MB</div>
                                <div id="addImagePreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer py-2">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="submitAddForm()">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 图片预览
        function previewAddImages(input) {
            const preview = document.getElementById('addImagePreview');
            preview.innerHTML = '';
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.style.cssText = 'width: 60px; height: 60px; object-fit: cover; border-radius: 4px;';
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            }
        }
        
        // 提交表单
        function submitAddForm() {
            const form = document.getElementById('addAccountForm');
            if (!form.projectId.value) {
                alert('请选择项目');
                return;
            }
            if (!form.type.value) {
                alert('请选择收支类型');
                return;
            }
            if (!form.categoryId.value) {
                alert('请选择费用分类');
                return;
            }
            if (!form.amount.value || form.amount.value <= 0) {
                alert('请输入有效金额');
                return;
            }
            form.submit();
        }
    </script>
</body>
</html>
