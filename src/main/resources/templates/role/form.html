<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout('配置角色权限', ~{::content})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <style>
            .permission-module {
                border: 1px solid #dee2e6;
                border-radius: 8px;
                margin-bottom: 16px;
                background: #fff;
            }
            .permission-module .module-header {
                display: flex;
                align-items: center;
                padding: 12px 16px;
                background: #f8f9fa;
                border-radius: 8px 8px 0 0;
                border-bottom: 1px solid #dee2e6;
            }
            .permission-module .module-header .form-check-label {
                font-weight: 600;
                font-size: 15px;
                color: #333;
                margin-left: 8px;
            }
            .permission-module .module-content {
                padding: 0;
            }
            .page-item {
                padding: 12px 16px;
                border-bottom: 1px solid #f0f0f0;
            }
            .page-item:last-child {
                border-bottom: none;
            }
            .page-header {
                display: flex;
                align-items: center;
                margin-bottom: 8px;
            }
            .page-header .form-check-label {
                font-weight: 500;
                font-size: 14px;
                color: #444;
                margin-left: 8px;
            }
            .page-operations {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                padding-left: 28px;
            }
            .op-item {
                display: flex;
                align-items: center;
            }
            .op-item .form-check-label {
                font-size: 13px;
                color: #666;
                margin-left: 4px;
                cursor: pointer;
            }
            .permission-tips {
                background: #e7f3ff;
                border: 1px solid #b3d9ff;
                border-radius: 6px;
                padding: 12px 16px;
                margin-bottom: 20px;
            }
            .permission-tips ul {
                margin: 0;
                padding-left: 20px;
            }
            .permission-tips li {
                color: #555;
                font-size: 13px;
                margin-bottom: 4px;
            }
        </style>
        <div class="container-fluid mt-4">
            <div class="row">
                <main class="col-md-12 px-md-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">配置角色权限</h1>
                        <div>
                            <a th:href="@{/role/list}" class="btn btn-secondary btn-sm">
                                <i class="bi bi-arrow-left"></i> 返回列表
                            </a>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <i class="bi bi-shield-lock"></i> 
                            角色：<span th:text="${role != null ? role.role_name : ''}"></span> 
                            (<span th:text="${role != null ? role.role_code : ''}"></span>)
                        </div>
                        <div class="card-body">
                            <div class="permission-tips">
                                <ul>
                                    <li><strong>页面访问</strong>：勾选后该角色可以看到此页面</li>
                                    <li><strong>操作权限</strong>：勾选后该角色可以执行对应操作（如新增、编辑、删除）</li>
                                    <li>勾选模块会自动勾选该模块下所有页面和操作；勾选页面会自动勾选该页面下所有操作</li>
                                </ul>
                            </div>

                            <form id="permissionForm">
                                <input type="hidden" id="roleId" th:value="${role != null ? role.id : ''}">
                                
                                <!-- 按模块分组展示权限 -->
                                <div th:if="${modules != null}" th:each="module : ${modules}" class="permission-module">
                                    <!-- 模块头部 -->
                                    <div class="module-header" th:if="${module != null}">
                                        <input class="form-check-input module-checkbox" type="checkbox"
                                               th:value="${module.id != null ? module.id : ''}"
                                               th:id="'mod-' + ${module.id != null ? module.id : ''}"
                                               th:checked="${menuIds != null and module.id != null and #lists.contains(menuIds, module.id)}">
                                        <label class="form-check-label" th:for="'mod-' + ${module.id != null ? module.id : ''}">
                                            <i th:class="${module.menu_icon != null ? module.menu_icon : 'bi-folder'}"></i>
                                            <span th:text="${module.menu_name != null ? module.menu_name : '未命名'}"></span>
                                        </label>
                                    </div>
                                    
                                    <!-- 模块内容：页面列表 -->
                                    <div class="module-content" th:if="${module != null and module.pages != null}">
                                        <div th:each="page : ${module.pages}" class="page-item" th:if="${page != null}">
                                            <!-- 单页面模块（没有父目录的独立页面）只显示操作权限 -->
                                            <th:block th:if="${module['is_single_page'] != null and module['is_single_page']}">
                                                <div class="page-operations" th:if="${page.operations != null and not #lists.isEmpty(page.operations)}">
                                                    <div th:each="op : ${page.operations}" class="op-item" th:if="${op != null}">
                                                        <input class="form-check-input op-checkbox" type="checkbox"
                                                               th:value="${op.id != null ? op.id : ''}"
                                                               th:id="'op-' + ${op.id != null ? op.id : ''}"
                                                               th:data-page="${page.id != null ? page.id : ''}"
                                                               th:data-module="${module.id != null ? module.id : ''}"
                                                               th:checked="${menuIds != null and op.id != null and #lists.contains(menuIds, op.id)}">
                                                        <label class="form-check-label" th:for="'op-' + ${op.id != null ? op.id : ''}"
                                                               th:text="${op.menu_name != null ? op.menu_name : '未命名'}">
                                                        </label>
                                                    </div>
                                                </div>
                                            </th:block>
                                                                                
                                            <!-- 普通模块下的页面，显示页面访问和操作权限 -->
                                            <th:block th:unless="${module['is_single_page'] != null and module['is_single_page']}">
                                                <!-- 页面头部：页面访问权限 -->
                                                <div class="page-header">
                                                    <input class="form-check-input page-checkbox" type="checkbox"
                                                           th:value="${page.id != null ? page.id : ''}"
                                                           th:id="'page-' + ${page.id != null ? page.id : ''}"
                                                           th:data-module="${module.id != null ? module.id : ''}"
                                                           th:checked="${menuIds != null and page.id != null and #lists.contains(menuIds, page.id)}">
                                                    <label class="form-check-label" th:for="'page-' + ${page.id != null ? page.id : ''}"
                                                           th:text="${page.menu_name != null ? page.menu_name : '未命名'} + '（页面访问）'">
                                                    </label>
                                                </div>
                                                                                    
                                                <!-- 页面操作权限 -->
                                                <div class="page-operations" th:if="${page.operations != null and not #lists.isEmpty(page.operations)}">
                                                    <div th:each="op : ${page.operations}" class="op-item" th:if="${op != null}">
                                                        <input class="form-check-input op-checkbox" type="checkbox"
                                                               th:value="${op.id != null ? op.id : ''}"
                                                               th:id="'op-' + ${op.id != null ? op.id : ''}"
                                                               th:data-page="${page.id != null ? page.id : ''}"
                                                               th:data-module="${module.id != null ? module.id : ''}"
                                                               th:checked="${menuIds != null and op.id != null and #lists.contains(menuIds, op.id)}">
                                                        <label class="form-check-label" th:for="'op-' + ${op.id != null ? op.id : ''}"
                                                               th:text="${op.menu_name != null ? op.menu_name : '未命名'}">
                                                        </label>
                                                    </div>
                                                </div>
                                            </th:block>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="text-end mt-4">
                                    <button type="button" class="btn btn-primary" onclick="savePermissions()">
                                        <i class="bi bi-save"></i> 保存权限配置
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </main>
            </div>
        </div>
        
        <script th:src="@{/js/jquery.min.js}"></script>
        <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
        <script th:src="@{/common/layout.js}"></script>
        
        <script>
            // 模块勾选时，自动勾选其下所有页面和操作
            document.querySelectorAll('.module-checkbox').forEach(function(checkbox) {
                checkbox.addEventListener('change', function() {
                    var moduleId = this.value;
                    var isChecked = this.checked;
                    // 勾选/取消模块下所有页面
                    document.querySelectorAll('.page-checkbox[data-module="' + moduleId + '"]').forEach(function(page) {
                        page.checked = isChecked;
                        var pageId = page.value;
                        // 勾选/取消页面下所有操作
                        document.querySelectorAll('.op-checkbox[data-page="' + pageId + '"]').forEach(function(op) {
                            op.checked = isChecked;
                        });
                    });
                });
            });

            // 页面勾选时，自动勾选其下所有操作，并响应父模块
            document.querySelectorAll('.page-checkbox').forEach(function(checkbox) {
                checkbox.addEventListener('change', function() {
                    var pageId = this.value;
                    var moduleId = this.getAttribute('data-module');
                    var isChecked = this.checked;
                    
                    // 勾选/取消页面下所有操作
                    document.querySelectorAll('.op-checkbox[data-page="' + pageId + '"]').forEach(function(op) {
                        op.checked = isChecked;
                    });
                    
                    // 勾选时自动勾选父模块
                    if (isChecked) {
                        var moduleCheckbox = document.querySelector('.module-checkbox[value="' + moduleId + '"');
                        if (moduleCheckbox) moduleCheckbox.checked = true;
                    }
                });
            });

            // 操作勾选时，自动勾选父页面和模块
            document.querySelectorAll('.op-checkbox').forEach(function(checkbox) {
                checkbox.addEventListener('change', function() {
                    if (this.checked) {
                        var pageId = this.getAttribute('data-page');
                        var moduleId = this.getAttribute('data-module');
                        
                        // 勾选父页面
                        var pageCheckbox = document.querySelector('.page-checkbox[value="' + pageId + '"');
                        if (pageCheckbox) pageCheckbox.checked = true;
                        
                        // 勾选父模块
                        var moduleCheckbox = document.querySelector('.module-checkbox[value="' + moduleId + '"');
                        if (moduleCheckbox) moduleCheckbox.checked = true;
                    }
                });
            });

            function savePermissions() {
                var roleId = document.getElementById('roleId').value;
                var menuIds = [];
                
                // 收集所有被勾选的权限 ID
                document.querySelectorAll('.module-checkbox:checked, .page-checkbox:checked, .op-checkbox:checked').forEach(function(cb) {
                    menuIds.push(cb.value);
                });
                
                if (menuIds.length === 0) {
                    if (!confirm('确定不分配任何权限吗？')) {
                        return;
                    }
                }
                
                fetch('/role/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'roleId=' + roleId + '&' + menuIds.map(function(id) { return 'menuIds=' + id; }).join('&')
                })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (result.success) {
                        alert('权限配置保存成功!');
                        window.location.href = '/role/list';
                    } else {
                        alert('保存失败:' + result.message);
                    }
                })
                .catch(function() {
                    alert('网络错误，请稍后重试');
                });
            }
        </script>
    </div>
</body>
</html>
