<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout('角色管理', ~{::content})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <div class="container-fluid mt-4">
            <div class="row">
                <!-- 主内容区 -->
                <main class="col-md-12 px-md-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">角色管理</h1>
                        <div>
                            <a th:if="${session.currentUser != null and (session.currentUser.roleCode == 'root' or session.currentUser.roleCode == 'boss')}"
                               th:href="@{/role/add}" 
                               class="btn btn-primary btn-sm me-2">
                                <i class="bi bi-plus-lg"></i> 新增角色
                            </a>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <i class="bi bi-people-fill"></i> 角色列表
                        </div>
                        <div class="card-body">
                            <table class="table table-bordered table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>角色编码</th>
                                        <th>角色名称</th>
                                        <th>备注</th>
                                        <th>菜单数量</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="role : ${roles}">
                                        <td th:text="${role.id}"></td>
                                        <td>
                                            <span class="badge bg-info" th:text="${role.role_code}"></span>
                                        </td>
                                        <td th:text="${role.role_name}"></td>
                                        <td th:text="${role.remark}"></td>
                                        <td>
                                            <span class="badge bg-success" th:text="${role.menu_count} + ' 个菜单'"></span>
                                        </td>
                                        <td>
                                            <a th:if="${session.currentUser != null and session.currentUser.hasPermission('role:edit')}"
                                               th:href="@{/role/edit/{id}(id=${role.id})}" 
                                               class="btn btn-sm btn-primary">
                                                <i class="bi bi-pencil-square"></i> 配置权限
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script th:src="@{/js/jquery.min.js}"></script>
        <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
        <script th:src="@{/common/layout.js}"></script>
    </body>
</html>
