# 生产环境配置
spring.application.name=accounting

# 生产数据库配置
spring.datasource.url=jdbc:mysql://hsc-online-mysql.ns-z4bn2xr7.svc.cluster.local:3306/hsc-online?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=2rcbkzcf
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.hello.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf配置（生产环境开启缓存）
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# 服务器配置
server.port=8080
server.servlet.session.timeout=30m
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 日志配置（生产环境降低日志级别）
logging.level.com.example.hello.mapper=warn
logging.level.root=info
