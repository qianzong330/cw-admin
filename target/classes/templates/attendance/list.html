            '<option value="2" ' + (attendance.overtimeType === 2 ? 'selected' : '') + '>休息日加班</option>' +
            '<option value="3" ' + (attendance.overtimeType === 3 ? 'selected' : '') + '>法定节假日加班</option>' +
            '</select>' +
            '</div>' +
            '<div style="margin-bottom:16px;">' +
            '<label style="font-size:13px;color:#374151;font-weight:500;">备注</label>' +
            '<input type="text" id="editRemark" class="form-control" value="' + (attendance.remark || '') + '">' +
            '</div>' +
            '</div>';
        
        // 添加出勤类型变化监听
        setTimeout(function() {
            var typeSelect = document.getElementById('editType');
            if (typeSelect) {
                typeSelect.onchange = function() {
                    var overtimeWrap = document.getElementById('editOvertimeWrap');
                    if (overtimeWrap) {
                        overtimeWrap.style.display = (this.value === '2') ? 'block' : 'none';
                    }
                };
            }
        }, 0);
        
        showModal({
            title: '编辑考勤记录',
            content: content,
            size: 'md',
            buttons: [
                { text: '取消', class: 'btn btn-secondary' },
                { 
                    text: '保存', 
                    class: 'btn btn-primary',
                    onclick: function() {
                        saveEditModal(attendanceId);
                    }
                }
            ]
        });
    }
    
    /**
     * 保存编辑（批量编辑模式）- 直接保存到数据库
     */
    function saveEditModal(attendanceId) {
        attendanceId = parseInt(attendanceId);
        
        var attendance = G.attendances.find(function(a) { return a.id === attendanceId; });
        if (!attendance) {
            toast('考勤记录不存在', 'danger');
            return;
        }
        
        var newType = parseInt(document.getElementById('editType').value);
        var newHours = parseFloat(document.getElementById('editHours').value);
        var newOvertime = document.getElementById('editOvertime').value;
        var newRemark = document.getElementById('editRemark').value;
        
        // 验证：如果出勤类型是加班，必须选择加班类型
        if (newType === 2 && !newOvertime) {
            toast('请选择加班类型', 'danger');
            return;
        }
        
        // 检查是否有实际变化
        var oldHours = attendance.workHours ? parseFloat(attendance.workHours) : null;
        // 加班类型比较：将 null 和空字符串视为相同
        var oldOvertime = attendance.overtimeType || null;
        var newOvertimeValue = newOvertime ? parseInt(newOvertime) : null;
        // 备注比较：将 null 和空字符串视为相同
        var oldRemark = attendance.remark || '';
        var newRemarkValue = newRemark || '';
        var hasChange = attendance.attendanceType !== newType
            || oldOvertime !== newOvertimeValue
            || oldHours !== newHours
            || oldRemark !== newRemarkValue;
        
        if (!hasChange) {
            toast('没有检测到变化，无需提交', 'warning');
            return;
        }
        
        // 构建修改记录数据
        var changeData = {
            attendanceId: attendanceId,
            projectId: attendance.projectId,
            employeeId: attendance.employeeId,
            workDate: attendance.workDate,
            yearMonth: G.yearMonth,
            changeType: 'EDIT',
            oldAttendanceType: attendance.attendanceType,
            oldOvertimeType: attendance.overtimeType,
            oldWorkHours: attendance.workHours ? parseFloat(attendance.workHours) : null,
            oldRemark: attendance.remark,
            newAttendanceType: newType,
            newOvertimeType: newOvertime ? parseInt(newOvertime) : null,
            newWorkHours: newHours ? parseFloat(newHours) : null,
            newRemark: newRemark,
            changeReason: '二次编辑修改',
            status: 0
        };
        
        // 调用后端API保存修改记录
        console.log('Sending change data:', changeData);
        fetch('/attendance/save-change-log', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(changeData)
        }).then(function(r) {
            console.log('Response status:', r.status);
            if (!r.ok) throw new Error('保存失败');
            return r.json();
        }).then(function(result) {
            console.log('Save result:', result);
            // 不更新前端原始数据，保持原样显示
            // 只标记为已修改，用于视觉提示
            attendance.isModified = true;
            
            closeModal();
            renderCalendar();
            renderDetail(G.selectedDate);
            
            toast('已记录编辑操作，审批通过后生效。变更内容可点击"查看变更"按钮查看。', 'info');
        }).catch(function(e) {
            toast('保存修改记录失败: ' + e.message, 'danger');
        });
    }
    
    /**
     * 提交二次编辑申请
     */
    function submitEditPending(attendanceId) {
        var reason = document.getElementById('pendingEditReason').value.trim();
        if (!reason) {
            toast('请填写变更原因', 'danger');
            return;
        }
        
        var attendanceType = parseInt(document.getElementById('pendingEditType').value);
        var workHours = parseFloat(document.getElementById('pendingEditHours').value);
        var overtimeType = document.getElementById('pendingEditOvertime').value;
        var remark = document.getElementById('pendingEditRemark').value;
        
        var params = new URLSearchParams();
        params.append('attendanceId', attendanceId);
        params.append('attendanceType', attendanceType);
        params.append('workHours', workHours);
        params.append('remark', remark || '');
        params.append('changeReason', reason);
        if (overtimeType) {
            params.append('overtimeType', overtimeType);
        }
        
        fetch('/attendance/api/create-change-log', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: params
        }).then(r => r.json()).then(function(res) {
            if (res.success) {
                toast('修改申请已提交，等待审批', 'success');
                closeModal();
                loadMonthData(); // 刷新数据
            } else {
                toast(res.message || '提交失败', 'danger');
            }
        }).catch(function(err) {
            toast('提交失败：' + err.message, 'danger');
        });
    }
    
    /**
     * 显示变更记录列表（审批人查看）- 按员工聚合展示
     */
    function showChangeLogs() {
        fetch('/attendance/api/change-logs?projectId=' + (G.projectId || '') + '&yearMonth=' + G.yearMonth)
            .then(r => r.json())
            .then(function(res) {
                if (!res.success || !res.logs || res.logs.length === 0) {
                    toast('暂无变更记录', 'info');
                    return;
                }
                
                var typeName = ['','出勤','加班','请假','缺勤','迟到','旷工'];
                var otName = ['','工作日','休息日','法定节假日'];
                
                // 按员工聚合
                var empMap = {};
                res.logs.forEach(function(log) {
                    var empId = log.employeeId;
                    if (!empMap[empId]) {
                        empMap[empId] = {
                            name: log.employeeName || '员工',
                            logs: []
                        };
                    }
                    empMap[empId].logs.push(log);
                });
                
                var content = '<div style="max-height:500px;overflow-y:auto;">';
                
                // 遍历每个员工
                Object.keys(empMap).forEach(function(empId) {
                    var emp = empMap[empId];
                    
                    // 按日期分组
                    var dateMap = {};
                    emp.logs.forEach(function(log) {
                        var date = log.workDate;
                        if (!dateMap[date]) {
                            dateMap[date] = [];
                        }
                        dateMap[date].push(log);
                    });
                    
                    content += '<div style="border:1px solid #e5e7eb;border-radius:8px;margin-bottom:16px;background:#fff;overflow:hidden;">';
                    // 员工标题栏
                    content += '<div style="background:#f8fafc;padding:12px 16px;border-bottom:1px solid #e5e7eb;font-weight:600;color:#374151;font-size:15px;">' +
                        '<i class="bi bi-person-circle me-2 text-primary"></i>' + emp.name +
                        '<span style="color:#6b7280;font-weight:normal;margin-left:8px;font-size:13px;">共 ' + emp.logs.length + ' 条变更</span>' +
                        '</div>';
                    
                    // 遍历每个日期
                    Object.keys(dateMap).sort().forEach(function(date) {
                        var dateLogs = dateMap[date];
                        
                        content += '<div style="padding:12px 16px;border-bottom:1px solid #f3f4f6;">';
                        content += '<div style="font-weight:500;color:#4b5563;margin-bottom:10px;font-size:14px;">' +
                            '<i class="bi bi-calendar3 me-2 text-secondary"></i>' + date +
                            '<span style="color:#9ca3af;font-weight:normal;margin-left:8px;font-size:12px;">' + dateLogs.length + ' 条</span>' +
                            '</div>';
                        
                        // 该日期下的所有变更
                        dateLogs.forEach(function(log) {
                            var changeTypeText = log.changeType === 'ADD' ? '新增' : (log.changeType === 'DELETE' ? '删除' : '编辑');
                            var changeTypeColor = log.changeType === 'ADD' ? '#16a34a' : (log.changeType === 'DELETE' ? '#dc2626' : '#2563eb');
                            var changeTypeBg = log.changeType === 'ADD' ? '#f0fdf4' : (log.changeType === 'DELETE' ? '#fef2f2' : '#eff6ff');
                            
                            // 根据变更类型显示不同的对比信息
                            var detailHtml = '';
                            if (log.changeType === 'ADD') {
                                var newType = typeName[log.newAttendanceType] || '-';
                                var newOt = log.newOvertimeType ? otName[log.newOvertimeType] : '-';
                                var newHours = log.newWorkHours || '-';
                                var newRemark = log.newRemark || '-';
                                detailHtml = '<div style="background:' + changeTypeBg + ';padding:10px;border-radius:6px;margin-top:6px;">' +
                                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
                                    '<span style="color:' + changeTypeColor + ';font-weight:600;font-size:13px;">' +
                                    '<i class="bi bi-plus-circle me-1"></i>新增</span>' +
                                    '<span style="color:#6b7280;font-size:12px;">' + (log.changeReason || '无') + '</span>' +
                                    '</div>' +
                                    '<div style="display:grid;grid-template-columns:repeat(4, 1fr);gap:8px;font-size:12px;">' +
                                    '<div><span style="color:#6b7280;">类型：</span><strong>' + newType + '</strong></div>' +
                                    '<div><span style="color:#6b7280;">工时：</span><strong>' + newHours + 'h</strong></div>' +
                                    '<div><span style="color:#6b7280;">加班：</span><strong>' + newOt + '</strong></div>' +
                                    '<div><span style="color:#6b7280;">备注：</span><strong>' + newRemark + '</strong></div>' +
                                    '</div></div>';
                            } else if (log.changeType === 'DELETE') {
                                var oldType = typeName[log.oldAttendanceType] || '-';
                                var oldOt = log.oldOvertimeType ? otName[log.oldOvertimeType] : '-';
                                var oldHours = log.oldWorkHours || '-';
                                var oldRemark = log.oldRemark || '-';
                                detailHtml = '<div style="background:' + changeTypeBg + ';padding:10px;border-radius:6px;margin-top:6px;">' +
                                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
                                    '<span style="color:' + changeTypeColor + ';font-weight:600;font-size:13px;">' +
                                    '<i class="bi bi-trash me-1"></i>删除</span>' +
                                    '<span style="color:#6b7280;font-size:12px;">' + (log.changeReason || '无') + '</span>' +
                                    '</div>' +
                                    '<div style="display:grid;grid-template-columns:repeat(4, 1fr);gap:8px;font-size:12px;color:#6b7280;">' +
                                    '<div>类型：<span style="text-decoration:line-through;">' + oldType + '</span></div>' +
                                    '<div>工时：<span style="text-decoration:line-through;">' + oldHours + 'h</span></div>' +
                                    '<div>加班：<span style="text-decoration:line-through;">' + oldOt + '</span></div>' +
                                    '<div>备注：<span style="text-decoration:line-through;">' + oldRemark + '</span></div>' +
                                    '</div></div>';
                            } else {
                                var oldType = typeName[log.oldAttendanceType] || '-';
                                var newType = typeName[log.newAttendanceType] || '-';
                                var oldOt = log.oldOvertimeType ? otName[log.oldOvertimeType] : '-';
                                var newOt = log.newOvertimeType ? otName[log.newOvertimeType] : '-';
                                var oldHours = log.oldWorkHours || '-';
                                var newHours = log.newWorkHours || '-';
                                var oldRemark = log.oldRemark || '-';
                                var newRemark = log.newRemark || '-';
                                
                                var typeChanged = oldType !== newType;
                                var hoursChanged = oldHours !== newHours;
                                var otChanged = oldOt !== newOt;
                                var remarkChanged = oldRemark !== newRemark;
                                
                                detailHtml = '<div style="background:' + changeTypeBg + ';padding:10px;border-radius:6px;margin-top:6px;">' +
                                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
                                    '<span style="color:' + changeTypeColor + ';font-weight:600;font-size:13px;">' +
                                    '<i class="bi bi-pencil me-1"></i>编辑</span>' +
                                    '<span style="color:#6b7280;font-size:12px;">' + (log.changeReason || '无') + '</span>' +
                                    '</div>' +
                                    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">' +
                                    '<div style="color:#6b7280;">变更前：<span style="text-decoration:line-through;">' + 
                                    oldType + (hoursChanged ? ' ' + oldHours + 'h' : '') + '</span></div>' +
                                    '<div style="color:#16a34a;font-weight:500;">变更后：' + 
                                    newType + (hoursChanged ? ' ' + newHours + 'h' : '') + '</div>' +
                                    '</div></div>';
                            }
                            
                            content += detailHtml;
                        });
                        
                        content += '</div>';
                    });
                    
                    content += '</div>';
                });
                
                content += '</div>';
                
                showModal({
                    title: '考勤变更记录（共 ' + res.logs.length + ' 条，' + Object.keys(empMap).length + ' 人）',
                    content: content,
                    size: 'lg',
                    buttons: [
                        { text: '关闭', class: 'btn btn-secondary' }
                    ]
                });
            })
            .catch(function(err) {
                toast('获取变更记录失败：' + err.message, 'danger');
            });
    }
    
    // ===== 通用弹窗函数 =====
    var currentModal = null;
    function showModal(options) {
        // 移除已存在的弹窗
        var existing = document.getElementById('dynamicModal');
        if (existing) existing.remove();
        
        var buttonsHtml = '';
        if (options.buttons) {
            buttonsHtml = options.buttons.map(function(btn, idx) {
                if (btn.callback || btn.onclick) {
                    return '<button type="button" class="' + btn.class + '" onclick="modalBtnClick(' + idx + ')">' + btn.text + '</button>';
                } else {
                    return '<button type="button" class="' + btn.class + '" data-bs-dismiss="modal">' + btn.text + '</button>';
                }
            }).join('');
        }
        
        var sizeClass = options.size === 'lg' ? 'modal-lg' : (options.size === 'sm' ? 'modal-sm' : '');
        
        var html = '<div class="modal fade" id="dynamicModal" tabindex="-1">' +
            '<div class="modal-dialog ' + sizeClass + '">' +
            '<div class="modal-content">' +
            '<div class="modal-header">' +
            '<h5 class="modal-title">' + esc(options.title) + '</h5>' +
            '<button type="button" class="btn-close" data-bs-dismiss="modal"></button>' +
            '</div>' +
            '<div class="modal-body">' + options.content + '</div>' +
            '<div class="modal-footer">' + buttonsHtml + '</div>' +
            '</div></div></div>';
        
        document.body.insertAdjacentHTML('beforeend', html);
        
        currentModal = {
            el: document.getElementById('dynamicModal'),
            buttons: options.buttons || [],
            bsModal: null
        };
        
        currentModal.bsModal = new bootstrap.Modal(currentModal.el);
        currentModal.bsModal.show();
    }
    
    function modalBtnClick(idx) {
        var btn = currentModal.buttons[idx];
        if (btn) {
            // 关闭弹窗
            if (currentModal && currentModal.bsModal) {
                currentModal.bsModal.hide();
            }
            // 执行回调
            if (btn.callback) {
                btn.callback();
            } else if (btn.onclick) {
                btn.onclick();
            }
        }
    }
    
    function closeModal() {
        if (currentModal && currentModal.bsModal) {
            currentModal.bsModal.hide();
        }
    }
    
    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    </script>
