<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::#mainContent})}">
<head>
    <title>考勤管理</title>
</head>
<body>
<div id="mainContent">
<style>
        /* ===== 整体布局 ===== */
        .attendance-wrap { display: flex; gap: 0; height: calc(100vh - 140px); min-height: 600px; }

        /* ===== 左侧员工列表 ===== */
        .emp-panel {
            width: 220px; min-width: 180px; flex-shrink: 0;
            background: #fff; border: 1px solid #dee2e6; border-radius: 8px 0 0 8px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .emp-panel-header {
            padding: 12px 14px; background: #f8f9fa;
            border-bottom: 1px solid #dee2e6; font-weight: 600; font-size: 13px; color: #495057;
        }
        .emp-list { flex: 1; overflow-y: auto; }
        .emp-item { 
            padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
            display: flex; align-items: center; justify-content: space-between; gap: 6px;
        }
        .emp-item:hover { background: #f0f4ff; }
        .emp-item.active { background: #e8f0fe; border-left: 3px solid #4361ee; }
        .emp-item .emp-name { font-size: 14px; font-weight: 500; color: #2c3e50; }
        .emp-item .emp-job { font-size: 11px; color: #adb5bd; margin-top: 2px; }
        .emp-days-badge {
            flex-shrink: 0; font-size: 11px; font-weight: 600;
            color: #16a34a; background: #f0faf4; border: 1px solid #b7ebc8;
            border-radius: 10px; padding: 2px 7px; white-space: nowrap;
            min-width: 32px; text-align: center;
        }
        .emp-days-badge.loading { color: #9ca3af; background: #f3f4f6; border-color: #e5e7eb; }

        /* ===== 右侧主区域 ===== */
        .main-panel {
            flex: 1; display: flex; flex-direction: column;
            border: 1px solid #dee2e6; border-left: none; border-radius: 0 8px 8px 0;
            background: #fff; overflow: hidden;
        }

        /* ===== 顶部工具栏 ===== */
        .toolbar {
            padding: 10px 16px; background: #f8f9fa; border-bottom: 1px solid #dee2e6;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .toolbar .emp-title { font-size: 15px; font-weight: 600; color: #2c3e50; flex: 1; }
        .toolbar .form-select, .toolbar .form-control { font-size: 13px; padding: 5px 10px; height: 32px; }
        .toolbar .btn { font-size: 13px; padding: 5px 12px; height: 32px; }

        /* ===== 汇总统计卡片 ===== */
        .summary-bar {
            display: flex; gap: 8px; padding: 10px 16px; background: #fff;
            border-bottom: 1px solid #f0f0f0; flex-wrap: wrap;
        }
        .stat-card {
            flex: 1; min-width: 90px; padding: 8px 12px; border-radius: 8px;
            text-align: center; border: 1px solid transparent;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .stat-card.green  { background: #f0faf4; border-color: #b7ebc8; }
        .stat-card.blue   { background: #eff6ff; border-color: #bfdbfe; }
        .stat-card.orange { background: #fffbeb; border-color: #fde68a; }
        .stat-card.cyan   { background: #ecfeff; border-color: #a5f3fc; }
        .stat-card.red    { background: #fff1f2; border-color: #fecdd3; }
        .stat-card .val   { font-size: 20px; font-weight: 700; line-height: 1.2; }
        .stat-card.green  .val { color: #16a34a; }
        .stat-card.blue   .val { color: #2563eb; }
        .stat-card.orange .val { color: #d97706; }
        .stat-card.cyan   .val { color: #0891b2; }
        .stat-card.red    .val { color: #dc2626; }
        .stat-card .lbl   { font-size: 11px; color: #6b7280; margin-top: 2px; }

        /* ===== 月历 ===== */
        .calendar-area { flex: 1; padding: 12px 16px; overflow-y: auto; }
        .cal-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
        .cal-nav .cal-month { font-size: 15px; font-weight: 600; color: #374151; }
        .cal-table { width: 100%; border-collapse: separate; border-spacing: 3px; }
        .cal-table th {
            text-align: center; font-size: 12px; color: #9ca3af;
            padding: 4px 0; font-weight: 500;
        }
        .cal-table th.weekend { color: #f87171; }
        .cal-cell {
            height: 72px; vertical-align: top; padding: 4px 5px;
            border: 1px solid #e5e7eb; border-radius: 6px;
            cursor: pointer; transition: all 0.15s; position: relative;
            background: #fff;
        }
        .cal-cell:hover { border-color: #4361ee; background: #f0f4ff; }
        .cal-cell.other-month { background: #f9fafb; cursor: default; border-color: #f0f0f0; }
        .cal-cell.other-month:hover { background: #f9fafb; border-color: #f0f0f0; }
        .cal-cell.future { background: #fafafa; cursor: not-allowed; }
        .cal-cell.future:hover { background: #fafafa; border-color: #e5e7eb; }
        .cal-cell.today { border-color: #4361ee; background: #f0f4ff; }
        .cal-cell.has-record { border-color: #86efac; }
        .cal-cell.selected { border-color: #4361ee; background: #e8f0fe; box-shadow: 0 0 0 2px rgba(67,97,238,.3); }
        .day-num { font-size: 12px; color: #374151; font-weight: 500; }
        .day-num.weekend { color: #f87171; }
        .day-num.today-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; background: #4361ee; color: #fff;
            border-radius: 50%; font-size: 11px;
        }
        .att-tags { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 3px; }
        .att-tag {
            font-size: 10px; padding: 1px 4px; border-radius: 3px;
            line-height: 1.4; white-space: nowrap;
        }
        .att-tag.t1 { background: #dcfce7; color: #16a34a; }
        .att-tag.t2 { background: #fef9c3; color: #92400e; }
        .att-tag.t3 { background: #e0f2fe; color: #0369a1; }
        .att-tag.t4 { background: #fee2e2; color: #dc2626; }

        /* ===== 二次编辑相关样式 ===== */
        .btn-edit-pending {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            color: #92400e;
        }
        .btn-edit-pending:hover {
            background: #fde68a;
            border-color: #d97706;
        }
        .pending-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fef3c7;
            color: #92400e;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #f59e0b;
            margin-left: 6px;
        }
        .change-log-item {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .change-log-item .change-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .change-log-item .change-title {
            font-weight: 600;
            color: #374151;
        }
        .change-log-item .change-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .change-log-item .change-status.pending {
            background: #fef3c7;
            color: #92400e;
        }
        .change-log-item .change-status.approved {
            background: #dcfce7;
            color: #166534;
        }
        .change-log-item .change-status.rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        .change-log-item .change-detail {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px;
        }
        .change-log-item .change-reason {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #e5e7eb;
        }
        .diff-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        .diff-old {
            color: #dc2626;
            text-decoration: line-through;
        }
        .diff-new {
            color: #16a34a;
        }
        .diff-arrow {
            color: #9ca3af;
        }

        /* ===== 右侧详情面板 ===== */
        .detail-panel {
            width: 240px; flex-shrink: 0; border-left: 1px solid #e5e7eb;
            padding: 14px; overflow-y: auto; background: #fafafa;
        }
        .detail-panel .detail-date { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 10px; }
        .record-item {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 6px;
            padding: 8px 10px; margin-bottom: 8px; position: relative;
        }
        .record-item .rec-type { font-size: 13px; font-weight: 500; }
        .record-item .rec-hours { font-size: 12px; color: #6b7280; margin-top: 2px; }
        .record-item .rec-actions { margin-top: 6px; display: flex; gap: 6px; }
        .record-item .btn-rec { font-size: 11px; padding: 2px 8px; }
        .no-record-hint { text-align: center; color: #adb5bd; padding: 30px 0; font-size: 13px; }

        /* ===== 空状态 ===== */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #adb5bd; }
        .empty-state i { font-size: 48px; margin-bottom: 12px; }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .attendance-wrap { flex-direction: column; height: auto; }
            .emp-panel { width: 100%; border-radius: 8px 8px 0 0; max-height: 200px; }
            .main-panel { border-radius: 0 0 8px 8px; border-left: 1px solid #dee2e6; }
            .detail-panel { width: 100%; border-left: none; border-top: 1px solid #e5e7eb; }
        }
    </style>

    <!-- 顶部筛选栏 -->
    <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
        <h5 class="mb-0 fw-bold"><i class="bi bi-calendar-check me-2 text-primary"></i>考勤管理</h5>
        <div class="d-flex align-items-center gap-2">
            <label class="text-muted mb-0" style="font-size:13px;">项目</label>
            <select class="form-select form-select-sm" id="projectId" style="width:170px;" onchange="changeProject()">
                <option th:each="proj : ${projects}" th:value="${proj.id}" th:text="${proj.name}"
                        th:selected="${proj.id == projectId}"></option>
            </select>
            <label class="text-muted mb-0" style="font-size:13px;">月份</label>
            <input type="month" class="form-control form-control-sm" id="yearMonth" style="width:140px;"
                   th:value="${yearMonth}" onchange="changeMonth()">
        </div>
        <!-- 页面提示容器（内容由JS填充到顶部导航栏） -->
        <div id="attendancePageHints" style="display:none;" data-target="topPageHints">
            <span id="pendingAttendanceHintData" style="font-size:12px;color:#d97706;background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:4px 10px;display:none;">
                <i class="bi bi-bell-fill me-1"></i><span id="pendingAttendanceHintText"></span>
            </span>
            <span id="rejectedAttendanceHintData" style="font-size:12px;color:#dc2626;background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;padding:4px 10px;display:none;">
                <i class="bi bi-x-circle-fill me-1"></i><span id="rejectedAttendanceHintText"></span>
            </span>
        </div>
        <!-- 考勤表状态提示 -->
        <div class="ms-auto d-flex align-items-center gap-2 flex-wrap" id="monthStatusWrap">
            <span class="text-muted" style="font-size:13px;">本月考勤表状态：</span>
            <span class="badge bg-secondary" id="monthStatusBadge">草稿</span>
            <span class="text-muted" id="monthStatusTip" style="font-size:12px;display:none;"></span>
            <!-- 下载模板按钮 -->
            <button class="btn btn-sm btn-outline-info" id="btnDownloadTemplate" onclick="downloadTemplate()">
                <i class="bi bi-download"></i> 下载模板
            </button>
            <!-- 导入考勤按钮 -->
            <button class="btn btn-sm btn-outline-success" id="btnImportAttendance" onclick="document.getElementById('importFile').click()" style="display:none;">
                <i class="bi bi-upload"></i> 导入考勤
            </button>
            <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none;" onchange="importAttendance(this)">
            <button class="btn btn-sm btn-primary" id="btnSubmitAudit" onclick="submitMonthAudit()">
                <i class="bi bi-send"></i> 提交审批
            </button>
            <!-- 已审批状态下显示申请修改按钮 -->
            <button class="btn btn-sm btn-warning" id="btnApplyChange" onclick="applyGlobalChange()" style="display:none;">
                <i class="bi bi-pencil-square"></i> 申请修改
            </button>
            <!-- 变更待审状态下显示提交变更按钮 -->
            <button class="btn btn-sm btn-info" id="btnSubmitChanges" onclick="submitGlobalChanges()" style="display:none;">
                <i class="bi bi-check2-all"></i> 提交变更
            </button>
            <button class="btn btn-sm btn-secondary" id="btnCancelChanges" onclick="cancelGlobalChanges()" style="display:none;">
                <i class="bi bi-x-lg"></i> 取消
            </button>
            <!-- 审批人专用按钮：待审批状态时显示 -->
            <button class="btn btn-sm btn-success" id="btnApprovePass" onclick="approveMonth(true)" style="display:none;">
                <i class="bi bi-check-circle"></i> 审批通过
            </button>
            <button class="btn btn-sm btn-danger" id="btnApproveReject" onclick="approveMonth(false)" style="display:none;">
                <i class="bi bi-x-circle"></i> 驳回
            </button>
            <button class="btn btn-sm btn-info" id="btnViewChanges" onclick="showChangeLogs()" style="display:none;">
                <i class="bi bi-eye"></i> 查看变更
            </button>
        </div>
    </div>

    <!-- 主面板 -->
    <div class="attendance-wrap">

        <!-- 左侧：员工列表 -->
        <div class="emp-panel">
            <div class="emp-panel-header">
                <div class="d-flex align-items-center justify-content-between">
                    <span><i class="bi bi-people me-1"></i>员工列表</span>
                    <span class="badge bg-primary" id="empCount" th:text="${#lists.size(employees)}">0</span>
                </div>
                <!-- 员工搜索框 -->
                <div class="mt-2">
                    <input type="text" class="form-control form-control-sm" id="empSearchInput" 
                           placeholder="搜索员工姓名..." style="font-size:12px;">
                </div>
            </div>
            <div class="emp-list" id="empList">
                <div th:if="${#lists.isEmpty(employees)}" class="text-center text-muted p-4" style="font-size:13px;">
                    暂无员工
                </div>
                <div class="emp-item" th:each="emp : ${employees}"
                     th:data-emp-id="${emp.id}"
                     th:data-emp-name="${emp.name}"
                     th:data-emp-job="${emp.jobCategoryName}"
                     th:data-emp-salary-type="${emp.salaryType}"
                     onclick="selectEmployee(this)">
                    <div>
                        <div class="emp-name" th:text="${emp.name}">姓名</div>
                        <div class="emp-job" th:text="${emp.jobCategoryName} ?: '未设置工种'">工种</div>
                    </div>
                    <div class="emp-days-badge loading" th:id="'empDays-' + ${emp.id}">-</div>
                </div>
            </div>
        </div>

        <!-- 右侧：主内容 -->
        <div class="main-panel">
            <!-- 权限标记（供JS使用） -->
            <input type="hidden" id="canAddAttendance" th:value="${session.currentUser != null and !session.currentUser.roleCode.equals('employee')}"/>
            <input type="hidden" id="currentRoleCode" th:value="${currentRoleCode}"/>

            <!-- 工具栏 -->
            <div class="toolbar">
                <span class="emp-title" id="currentEmpTitle">
                    <i class="bi bi-person-circle text-primary me-1"></i>
                    <span id="currentEmpName">请从左侧选择员工</span>
                </span>
                
                <!-- 考勤签字表上传和查看 -->
                <div id="signUploadSection" style="display:none;">
                    <input type="file" id="signImageInput" accept="image/*" multiple style="display:none;" onchange="uploadSignImages()">
                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="document.getElementById('signImageInput').click()">
                        <i class="bi bi-upload me-1"></i>上传签字表
                    </button>
                    <button type="button" class="btn btn-outline-info btn-sm" id="viewSignBtn" onclick="viewSignImages()" style="display:none;">
                        <i class="bi bi-eye me-1"></i>查看签字表
                    </button>
                </div>
            </div>

            <!-- 汇总统计 -->
            <div class="summary-bar" id="summaryBar">
                <div class="stat-card green">
                    <div class="val" id="statNormalDays">-</div>
                    <div class="lbl">当月出勤天数</div>
                </div>
                <div class="stat-card blue">
                    <div class="val" id="statNormalHours">-</div>
                    <div class="lbl">当月出勤总工时</div>
                </div>
                <div class="stat-card orange" style="display:flex;flex-direction:column;justify-content:center;gap:6px;">
                    <div style="display:flex;justify-content:center;align-items:center;gap:8px;">
                        <span style="font-size:12px;color:#9ca3af;">工作日加班</span>
                        <span class="val" style="font-size:16px;" id="statWeekdayOvertimeHours">-</span>
                    </div>
                    <div style="border-top:1px dashed #fed7aa;"></div>
                    <div style="display:flex;justify-content:center;align-items:center;gap:8px;">
                        <span style="font-size:12px;color:#9ca3af;">休息日加班</span>
                        <span class="val" style="font-size:16px;" id="statRestdayOvertimeHours">-</span>
                    </div>
                    <div style="border-top:1px dashed #fed7aa;"></div>
                    <div style="display:flex;justify-content:center;align-items:center;gap:8px;">
                        <span style="font-size:12px;color:#9ca3af;">节假日加班</span>
                        <span class="val" style="font-size:16px;" id="statHolidayOvertimeHours">-</span>
                    </div>
                </div>
                <div class="stat-card cyan">
                    <div class="val" id="statLeaveHours">-</div>
                    <div class="lbl">当月请假总工时</div>
                </div>
                <div class="stat-card" style="background:#fff7ed;border-color:#fed7aa;">
                    <div class="val" style="color:#c2410c;" id="statLateHours">-</div>
                    <div class="lbl">当月迟到总工时</div>
                </div>
                <div class="stat-card red">
                    <div class="val" id="statAbsentHours">-</div>
                    <div class="lbl">当月旷工总工时</div>
                </div>
            </div>

            <!-- 月历 + 详情 并排 -->
            <div style="display:flex; flex:1; overflow:hidden;">

                <!-- 月历区 -->
                <div class="calendar-area" id="calendarArea">
                    <div class="empty-state" id="emptyHint">
                        <i class="bi bi-person-check"></i>
                        <p>请从左侧选择员工查看考勤</p>
                    </div>
                    <div id="calendarWrap" style="display:none;">
                        <div class="cal-nav">
                            <span class="cal-month" id="calMonthTitle"></span>
                        </div>
                        <table class="cal-table">
                            <thead>
                                <tr>
                                    <th class="weekend">日</th>
                                    <th>一</th><th>二</th><th>三</th><th>四</th><th>五</th>
                                    <th class="weekend">六</th>
                                </tr>
                            </thead>
                            <tbody id="calBody"></tbody>
                        </table>
                        <!-- 统计说明 -->
                        <div class="mt-3 p-3 bg-light rounded" style="font-size:12px;color:#6b7280;">
                            <div class="fw-bold mb-2 text-dark">统计说明：</div>
                            <div class="row g-2">
                                <div class="col-md-4"><strong>当月出勤天数</strong>：出勤总工时÷每日标准工时</div>
                                <div class="col-md-4"><strong>当月出勤总工时</strong>：出勤工时累计</div>
                                <div class="col-md-4"><strong>当月请假总工时</strong>：请假工时累计</div>
                                <div class="col-md-4"><strong>当月迟到总工时</strong>：迟到记录累计</div>
                                <div class="col-md-4"><strong>当月旷工总工时</strong>：旷工记录累计</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧详情 -->
                <div class="detail-panel" id="detailPanel">
                    <div class="no-record-hint">
                        <i class="bi bi-calendar3" style="font-size:28px; display:block; margin-bottom:8px;"></i>
                        点击日历日期<br>查看当日考勤
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ===== 新增/编辑考勤弹窗 ===== -->
    <div class="modal fade" id="attendanceModal" tabindex="-1">
        <div class="modal-dialog" style="max-width:460px;">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title fw-bold" id="modalTitle">新增考勤</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="attId">
                    <input type="hidden" id="attEmpId">
                    <input type="hidden" id="attProjId">
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label mb-1" style="font-size:13px;">员工</label>
                            <input class="form-control form-control-sm" id="attEmpName" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label mb-1" style="font-size:13px;">工作日期</label>
                            <input type="date" class="form-control form-control-sm" id="attDate">
                        </div>
                        <div class="col-6">
                            <label class="form-label mb-1" style="font-size:13px;">计算方式</label>
                            <select class="form-select form-select-sm" id="attCalcType" onchange="onCalcTypeChange()" disabled>
                                <option value="">加载中...</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label mb-1" style="font-size:13px;">出勤类型 <span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" id="attType" onchange="onTypeChange()">
                                <option value="1">出勤</option>
                                <option value="2">加班</option>
                                <option value="3">请假</option>
                                <option value="5">迟到</option>
                                <option value="6">旷工</option>
                            </select>
                        </div>
                        <div class="col-6" id="overtimeTypeWrap" style="display:none;">
                            <label class="form-label mb-1" style="font-size:13px;"><span class="text-danger">*</span> 加班类型</label>
                            <select class="form-select form-select-sm" id="attOvertimeType">
                                <option value="">请选择</option>
                                <option value="1">工作日加班</option>
                                <option value="2">休息日加班</option>
                                <option value="3">法定假期加班</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label mb-1" style="font-size:13px;">工时（小时）<span class="text-danger">*</span></label>
                            <input type="number" class="form-control form-control-sm" id="attHours"
                                   value="8" step="0.5" min="0.5" max="24">
                        </div>
                        <div class="col-6">
                            <label class="form-label mb-1" style="font-size:13px;">每日工时（h）</label>
                            <input type="number" class="form-control form-control-sm bg-light" id="attDailyHours"
                                   readonly style="color:#6c757d;cursor:not-allowed;">
                        </div>
                        <div class="col-12">
                            <label class="form-label mb-1" style="font-size:13px;">备注</label>
                            <textarea class="form-control form-control-sm" id="attRemark" rows="2"></textarea>
                        </div>

                <div class="modal-footer py-2">
                    <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                    <button class="btn btn-sm btn-primary" onclick="saveAttendance()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 消息提示 Modal ===== -->
    <div class="modal fade" id="msgModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header py-2" id="msgModalHeader">
                    <h6 class="modal-title fs-6" id="msgModalTitle">提示</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-3" id="msgModalBody">
                    操作成功
                </div>
                <div class="modal-footer py-2">
                    <button type="button" class="btn btn-sm btn-primary" data-bs-dismiss="modal">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script>
    // ===== 全局状态 =====
    var G = {
        empId: null, empName: '',
        yearMonth: document.getElementById('yearMonth').value,
        projectId: parseInt(document.getElementById('projectId').value) || null,
        calDate: null,            // Date 对象，当前日历年月
        attendances: [],          // 当前员工当月所有考勤记录
        selectedDate: null,       // 当前选中的日期字符串 yyyy-MM-dd
        modal: null
    };

    document.addEventListener('DOMContentLoaded', function() {
        G.modal = new bootstrap.Modal(document.getElementById('attendanceModal'));
        G.msgModal = new bootstrap.Modal(document.getElementById('msgModal'));
        // 初始化日历日期为当前筛选月
        var ym = G.yearMonth.split('-');
        G.calDate = new Date(parseInt(ym[0]), parseInt(ym[1]) - 1, 1);
        // 自动选中第一个员工
        var first = document.querySelector('.emp-item');
        if (first) selectEmployee(first);
        // 加载月度考勤状态
        loadMonthStatus();
        // 加载所有员工左侧列表天数
        loadAllEmpDays();
        // 加载待审批项目提示
        loadAttendancePendingHint();
        // 检查签字表图片
        checkSignImages();
    });

    function loadAttendancePendingHint() {
        Promise.all([
            fetch('/api/pending/attendance/projects').then(function(r) { return r.json(); }),
            fetch('/api/pending/attendance/missing').then(function(r) { return r.json(); })
        ]).then(function(results) {
                var data = results[0];
                var missingList = results[1] || [];
                var pending = data.pending || [];
                var rejected = data.rejected || [];

                // 待审批提示（黄色）- 根据是否当前用户审批显示不同文案
                var myApprovals = [];
                var otherApprovals = [];
                pending.forEach(function(item) {
                    if (item.isMyApproval) {
                        myApprovals.push(item.project);
                    } else {
                        otherApprovals.push(item.project);
                    }
                });

                var pendingHtml = '';
                if (myApprovals.length > 0) {
                    pendingHtml += '<span style="font-size:12px;color:#d97706;background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:4px 10px;margin-right:4px;">' +
                        '<i class="bi bi-bell-fill me-1"></i>待我审批：' + myApprovals.join('、') + '</span>';
                }
                if (otherApprovals.length > 0) {
                    pendingHtml += '<span style="font-size:12px;color:#d97706;background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:4px 10px;">' +
                        '<i class="bi bi-bell-fill me-1"></i>审批中：' + otherApprovals.join('、') + '</span>';
                }

                // 未生效提示（红色）：合并 rejected（已驳回）和 missing（有数据但未审批通过），去重
                var inactiveSet = {};
                rejected.forEach(function(item) { inactiveSet[item] = true; });
                missingList.forEach(function(item) { inactiveSet[item] = true; });
                var inactiveList = Object.keys(inactiveSet);
                var inactiveHtml = '';
                if (inactiveList.length > 0) {
                    inactiveHtml = '<span style="font-size:12px;color:#dc2626;background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;padding:4px 10px;">' +
                        '<i class="bi bi-x-circle-fill me-1"></i>未生效：' + inactiveList.join('、') + '</span>';
                }

                // 填充到顶部导航栏的提示区域
                var topHints = document.getElementById('topPageHints');
                if (topHints) {
                    topHints.innerHTML = pendingHtml + (pendingHtml && inactiveHtml ? ' ' : '') + inactiveHtml;
                }
            })
            .catch(function() {});
    }

    function refreshAttendanceBadge() {
        fetch('/api/pending/count')
            .then(function(r) { return r.json(); })
            .then(function(counts) {
                var count = counts.attendance || 0;
                document.querySelectorAll('.attendance-pending-badge').forEach(function(el) {
                    if (count > 0) {
                        el.textContent = count;
                        el.style.display = '';
                    } else {
                        el.style.display = 'none';
                    }
                });
            })
            .catch(function() {});
    }

    // ===== 员工选择 =====
    function selectEmployee(el) {
        document.querySelectorAll('.emp-item').forEach(function(e){ e.classList.remove('active'); });
        el.classList.add('active');
        G.empId = parseInt(el.getAttribute('data-emp-id'));
        G.empName = el.getAttribute('data-emp-name');
        G.empSalaryType = parseInt(el.getAttribute('data-emp-salary-type')) || 2; // 默认月薪
        document.getElementById('currentEmpName').textContent = G.empName;

        // 重置选中日期
        G.selectedDate = null;

        // 显示日历
        document.getElementById('emptyHint').style.display = 'none';
        document.getElementById('calendarWrap').style.display = 'block';

        loadMonthData();
        
        // 检查签字表图片
        checkSignImages();
    }

    // ===== 加载当月数据（考勤记录 + 统计）=====
    function loadMonthData() {
        if (!G.empId) return;
        
        var ym = G.yearMonth;
        var pid = G.projectId;
        var url = '/attendance/calendar/' + G.empId + '?yearMonth=' + ym + (pid ? '&projectId=' + pid : '');
        fetch(url).then(r => r.json()).then(function(data) {
            G.attendances = data;
            
            // 如果是已审批状态，检查每个考勤记录是否有待审批的修改
            if (G.monthStatus === 5 && data.length > 0) {
                checkPendingChangesForAttendances();
            } else {
                renderCalendar();
                loadSummary();
                renderDetail(G.selectedDate);
            }
        });
    }
    
    // 检查考勤记录的待审批修改
    function checkPendingChangesForAttendances() {
        var promises = G.attendances.map(function(a) {
            return fetch('/attendance/api/pending-change?attendanceId=' + a.id)
                .then(r => r.json())
                .then(function(data) {
                    a.hasPendingChange = data.hasPending;
                })
                .catch(function() {
                    a.hasPendingChange = false;
                });
        });
        
        Promise.all(promises).then(function() {
            renderCalendar();
            loadSummary();
            renderDetail(G.selectedDate);
        });
    }

    // ===== 加载全部员工出勤天数（左侧列表徽章）=====
    function loadAllEmpDays() {
        var items = document.querySelectorAll('.emp-item[data-emp-id]');
        items.forEach(function(el) {
            var empId = el.getAttribute('data-emp-id');
            var badge = document.getElementById('empDays-' + empId);
            if (!badge) return;
            badge.className = 'emp-days-badge loading';
            badge.textContent = '…';
            var url = '/attendance/summary/' + empId + '?yearMonth=' + G.yearMonth
                    + (G.projectId ? '&projectId=' + G.projectId : '');
            fetch(url).then(function(r) { return r.json(); }).then(function(s) {
                var days = s.normalDays != null ? s.normalDays : 0;
                badge.textContent = days + '天';
                badge.className = days > 0 ? 'emp-days-badge' : 'emp-days-badge loading';
            }).catch(function() {
                badge.textContent = '-';
                badge.className = 'emp-days-badge loading';
            });
        });
    }

    // ===== 员工搜索功能 =====
    document.getElementById('empSearchInput').addEventListener('input', function(e) {
        var keyword = e.target.value.trim().toLowerCase();
        var items = document.querySelectorAll('.emp-item');
        items.forEach(function(item) {
            var empName = item.querySelector('.emp-name').textContent.toLowerCase();
            if (empName.indexOf(keyword) >= 0) {
                item.style.display = 'flex';
            } else {
                item.style.display = 'none';
            }
        });
    });

    // ===== 考勤签字表上传 =====
    function uploadSignImages() {
        var input = document.getElementById('signImageInput');
        var files = input.files;
        if (!files || files.length === 0) return;
        
        if (!G.yearMonth) {
            toast('请先选择月份', 'warning');
            return;
        }
        
        var formData = new FormData();
        formData.append('yearMonth', G.yearMonth);
        formData.append('projectId', G.projectId || '');
        for (var i = 0; i < files.length; i++) {
            formData.append('files', files[i]);
        }
        
        fetch('/attendance/sign-image/upload', {
            method: 'POST',
            body: formData
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.success) {
                toast('上传成功', 'success');
                checkSignImages();
            } else {
                toast(data.message || '上传失败', 'danger');
            }
        }).catch(function() {
            toast('上传失败', 'danger');
        });
    }
    
    // ===== 查看签字表图片 =====
    function viewSignImages() {
        if (!G.yearMonth) {
            toast('请先选择月份', 'warning');
            return;
        }
        
        var url = '/attendance/sign-image/list?yearMonth=' + G.yearMonth
                + (G.projectId ? '&projectId=' + G.projectId : '');
        fetch(url).then(function(r) { return r.json(); }).then(function(data) {
            if (data.success && data.images && data.images.length > 0) {
                showSignImagesModal(data.images);
            } else {
                toast('暂无签字表图片', 'warning');
            }
        }).catch(function() {
            toast('获取图片失败', 'danger');
        });
    }
    
    // ===== 显示签字表图片弹窗 =====
    function showSignImagesModal(images) {
        // 保存图片数组供下载使用
        window.currentSignImages = images;
        
        var html = '<div style="max-height:500px;overflow-y:auto;padding:10px;" id="signImagesContainer">';
        html += '<div style="position:sticky;top:0;background:#fff;padding:10px 0;border-bottom:1px solid #ddd;margin-bottom:15px;z-index:10;display:flex;justify-content:center;gap:10px;">';
        html += '<button type="button" class="btn btn-outline-success btn-sm" onclick="downloadSignImages()"><i class="bi bi-download"></i> 下载全部</button>';
        html += '</div>';
        images.forEach(function(img, idx) {
            html += '<div style="margin-bottom:20px;text-align:center;" class="sign-image-wrapper">';
            html += '<div class="sign-image-viewport" style="width:100%;height:400px;overflow:hidden;position:relative;border:1px solid #ddd;border-radius:4px;background:#f5f5f5;" onwheel="handleSignImageWheel(event, ' + idx + ')" onmousedown="startSignImageDrag(event, ' + idx + ')">';
            html += '<img src="' + img + '" data-idx="' + idx + '" class="sign-image" style="position:absolute;left:0;top:0;transform-origin:0 0;transition:none;cursor:grab;max-width:none;" draggable="false">';
            html += '</div>';
            html += '<div style="margin-top:8px;color:#666;font-size:12px;">图片 ' + (idx + 1) + ' / ' + images.length + '</div>';
            html += '</div>';
        });
        html += '</div>';
        
        showModal({
            title: '考勤签字表',
            content: html,
            buttons: [{ text: '关闭', class: 'btn btn-secondary' }]
        });
        
        // 初始化每张图片的状态
        window.signImageStates = images.map(function() {
            return { scale: 1, x: 0, y: 0, isDragging: false, dragStartX: 0, dragStartY: 0 };
        });
    }
    
    // ===== 鼠标滚轮缩放 =====
    function handleSignImageWheel(event, idx) {
        event.preventDefault();
        var img = document.querySelector('#signImagesContainer img[data-idx="' + idx + '"]');
        var state = window.signImageStates[idx];
        
        // 根据滚轮方向调整缩放比例
        var delta = event.deltaY > 0 ? -0.1 : 0.1;
        var newScale = state.scale + delta;
        if (newScale < 0.3) newScale = 0.3;
        if (newScale > 5) newScale = 5;
        
        // 计算鼠标相对于图片的位置
        var rect = img.parentElement.getBoundingClientRect();
        var mouseX = event.clientX - rect.left;
        var mouseY = event.clientY - rect.top;
        
        // 调整位移使鼠标位置保持不变
        var scaleRatio = newScale / state.scale;
        state.x = mouseX - (mouseX - state.x) * scaleRatio;
        state.y = mouseY - (mouseY - state.y) * scaleRatio;
        state.scale = newScale;
        
        updateSignImageTransform(img, state);
    }
    
    // ===== 拖拽移动 =====
    function startSignImageDrag(event, idx) {
        event.preventDefault();
        var img = document.querySelector('#signImagesContainer img[data-idx="' + idx + '"]');
        var state = window.signImageStates[idx];
        
        state.isDragging = true;
        state.dragStartX = event.clientX - state.x;
        state.dragStartY = event.clientY - state.y;
        img.style.cursor = 'grabbing';
        
        function onMouseMove(e) {
            if (!state.isDragging) return;
            state.x = e.clientX - state.dragStartX;
            state.y = e.clientY - state.dragStartY;
            updateSignImageTransform(img, state);
        }
        
        function onMouseUp() {
            state.isDragging = false;
            img.style.cursor = 'grab';
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }
        
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    }
    
    // ===== 更新图片变换 =====
    function updateSignImageTransform(img, state) {
        img.style.transform = 'translate(' + state.x + 'px, ' + state.y + 'px) scale(' + state.scale + ')';
    }
    
    // ===== 重置缩放 =====
    function resetSignImageZoom() {
        if (!window.signImageStates) return;
        window.signImageStates.forEach(function(state, idx) {
            state.scale = 1;
            state.x = 0;
            state.y = 0;
            var img = document.querySelector('#signImagesContainer img[data-idx="' + idx + '"]');
            if (img) updateSignImageTransform(img, state);
        });
    }
    
    // ===== 下载签字表图片 =====
    function downloadSignImages() {
        if (!window.currentSignImages || window.currentSignImages.length === 0) {
            toast('没有可下载的图片', 'warning');
            return;
        }
        
        var images = window.currentSignImages;
        var yearMonth = G.yearMonth || 'unknown';
        var projectName = G.projectName || 'project';
        
        // 下载所有图片
        images.forEach(function(imgUrl, idx) {
            var link = document.createElement('a');
            link.href = imgUrl;
            link.download = '考勤签字表_' + projectName + '_' + yearMonth + '_图片' + (idx + 1) + '.jpg';
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
        
        toast('已开始下载 ' + images.length + ' 张图片', 'success');
    }
    
    // ===== 检查是否有签字表图片 =====
    function checkSignImages() {
        if (!G.yearMonth) {
            document.getElementById('signUploadSection').style.display = 'none';
            return;
        }
        
        // 显示上传区域
        document.getElementById('signUploadSection').style.display = 'block';
        
        var url = '/attendance/sign-image/list?yearMonth=' + G.yearMonth
                + (G.projectId ? '&projectId=' + G.projectId : '');
        fetch(url).then(function(r) { return r.json(); }).then(function(data) {
            var viewBtn = document.getElementById('viewSignBtn');
            if (data.success && data.images && data.images.length > 0) {
                viewBtn.style.display = 'inline-block';
            } else {
                viewBtn.style.display = 'none';
            }
        }).catch(function() {
            document.getElementById('viewSignBtn').style.display = 'none';
        });
    }

    // ===== 汇总统计 =====
    function loadSummary() {
        if (!G.empId) return;
        var url = '/attendance/summary/' + G.empId + '?yearMonth=' + G.yearMonth
                + (G.projectId ? '&projectId=' + G.projectId : '');
        fetch(url).then(r => r.json()).then(function(s) {
            document.getElementById('statNormalDays').textContent    = (s.normalDays || 0) + '天';
            document.getElementById('statNormalHours').textContent   = (s.normalHours || 0) + 'h';
            // 分类型加班工时
            document.getElementById('statWeekdayOvertimeHours').textContent  = (s.weekdayOvertimeHours || 0) + 'h';
            document.getElementById('statRestdayOvertimeHours').textContent  = (s.restdayOvertimeHours || 0) + 'h';
            document.getElementById('statHolidayOvertimeHours').textContent  = (s.holidayOvertimeHours || 0) + 'h';
            document.getElementById('statLeaveHours').textContent    = (s.leaveHours || 0) + 'h';
            document.getElementById('statLateHours').textContent     = (s.lateHours || 0) + 'h';
            document.getElementById('statAbsentHours').textContent   = (s.absentHours || 0) + 'h';
            // 同步左侧员工列表天数徽章
            var days = s.normalDays != null ? s.normalDays : 0;
            var badge = document.getElementById('empDays-' + G.empId);
            if (badge) {
                badge.textContent = days + '天';
                badge.className = days > 0 ? 'emp-days-badge' : 'emp-days-badge loading';
            }
        });
    }

    // ===== 渲染月历 =====
    function renderCalendar() {
        // 日历始终显示筛选框选择的月份（不再允许切换）
        var filterYm = G.yearMonth.split('-');
        var year = parseInt(filterYm[0]);
        var month = parseInt(filterYm[1]) - 1; // 0-based
        var ym = G.yearMonth;

        // 更新标题为 "2026年3月考勤"
        document.getElementById('calMonthTitle').textContent = year + '年' + (month + 1) + '月考勤';

        // 构建日期→考勤 map（只取当前日历显示的月份数据，但 G.attendances 只有筛选月数据）
        var attMap = {};
        G.attendances.forEach(function(a) {
            if (!attMap[a.workDate]) attMap[a.workDate] = [];
            attMap[a.workDate].push(a);
        });

        var today = new Date(); today.setHours(0,0,0,0);
        var firstDay = new Date(year, month, 1);
        var startCell = new Date(firstDay);
        startCell.setDate(startCell.getDate() - firstDay.getDay());

        var html = '';
        for (var w = 0; w < 6; w++) {
            html += '<tr>';
            for (var d = 0; d < 7; d++) {
                var cellDate = new Date(startCell);
                cellDate.setDate(startCell.getDate() + w * 7 + d);
                cellDate.setHours(0,0,0,0);
                var dateStr = fmtDate(cellDate);
                var isCurMonth = cellDate.getMonth() === month;
                var isToday    = cellDate.getTime() === today.getTime();
                var isFuture   = cellDate.getTime() > today.getTime();
                var isWeekend  = (d === 0 || d === 6);
                var isSelected = (dateStr === G.selectedDate);

                var cls = 'cal-cell';
                if (!isCurMonth) cls += ' other-month';
                else if (isFuture) cls += ' future';
                if (isToday) cls += ' today';
                if (isSelected) cls += ' selected';
                if (isCurMonth && !isFuture && attMap[dateStr] && attMap[dateStr].length > 0) cls += ' has-record';

                var onclick = (isCurMonth && !isFuture)
                    ? 'onclick="clickDay(\'' + dateStr + '\')"' : '';

                var dayNumCls = 'day-num' + (isWeekend ? ' weekend' : '');
                var dayNumHtml = isToday
                    ? '<span class="today-num">' + cellDate.getDate() + '</span>'
                    : cellDate.getDate();

                var tagsHtml = '';
                if (isCurMonth && attMap[dateStr]) {
                    attMap[dateStr].forEach(function(a) {
                        var tc = 't' + a.attendanceType;
                        var txt = ['','出','加','假','缺','迟','旷'][a.attendanceType] || '?';
                        var h = a.workHours ? a.workHours + 'h' : '';
                        tagsHtml += '<span class="att-tag ' + tc + '">' + txt + (h ? ' ' + h : '') + '</span>';
                    });
                }

                html += '<td class="' + cls + '" ' + onclick + '>';
                html += '<div class="' + dayNumCls + '">' + dayNumHtml + '</div>';
                html += '<div class="att-tags">' + tagsHtml + '</div>';
                html += '</td>';
            }
            html += '</tr>';
        }
        document.getElementById('calBody').innerHTML = html;
    }

    // ===== 点击日期 =====
    function clickDay(dateStr) {
        G.selectedDate = dateStr;
        renderCalendar();
        renderDetail(dateStr);
    }

    // ===== 渲染右侧详情 =====
    function renderDetail(dateStr) {
        var panel = document.getElementById('detailPanel');
        if (!dateStr) {

        renderCalendar();
    }

    // ===== 切换项目/月份 =====
    function changeProject() {
        G.projectId = parseInt(document.getElementById('projectId').value) || null;
        var ym = document.getElementById('yearMonth').value;

    // ===== 工时配置缓存（弹窗用）=====
    G.workHourConfigs = [];

    // 根据员工薪资类型设置计算方式：1-日薪→1-日薪计算，2/3-月薪/年薪→2-月薪计算
    function setCalcTypeByEmployee() {
        var sel = document.getElementById('attCalcType');
        var dailyHoursInput = document.getElementById('attDailyHours');
        var salaryType = G.empSalaryType || 2; // 默认月薪
        var calcType = (salaryType === 1) ? 1 : 2; // 日薪→日薪计算，月薪/年薪→月薪计算
        var calcTypeName = (calcType === 1) ? '日薪计算' : '月薪计算';
        var defaultHours = '8';
        
        // 查找对应配置的每日工时
        var config = G.workHourConfigs.find(function(c) { return c.calcType === calcType; });
        if (config) {
            defaultHours = config.dailyWorkHours || '8';
        }
        
        // 设置下拉框（只有当前选项，且置灰禁用）
        sel.innerHTML = '<option value="' + calcType + '">' + calcTypeName + '</option>';
        sel.disabled = true;
        sel.classList.add('bg-light');
        
        dailyHoursInput.value = defaultHours;
    }

    function loadWorkHourConfigs(callback) {
        if (G.workHourConfigs.length > 0) { 
            setCalcTypeByEmployee();
            if (callback) callback(); 
            return; 
        }
        fetch('/workhour/configs-for-select').then(r => r.json()).then(function(list) {
            G.workHourConfigs = list;
            setCalcTypeByEmployee();
            if (callback) callback();
        });
    }

    function onCalcTypeChange() {
        var sel = document.getElementById('attCalcType');
        var opt = sel.options[sel.selectedIndex];
        var h = opt ? opt.getAttribute('data-hours') : '8';
        document.getElementById('attDailyHours').value = h || '8';
    }

    // ===== 新增考勤弹窗 =====
    function openAddModal(dateStr) {
        document.getElementById('modalTitle').textContent = '新增考勤';
        document.getElementById('attId').value = '';
        document.getElementById('attEmpId').value = G.empId;
        document.getElementById('attEmpName').value = G.empName;
        document.getElementById('attProjId').value = G.projectId || '';
        document.getElementById('attDate').value = dateStr || G.selectedDate || fmtDate(new Date());
        document.getElementById('attType').value = '1';
        document.getElementById('attRemark').value = '';
        document.getElementById('overtimeTypeWrap').style.display = 'none';
        loadWorkHourConfigs(function() {
            onTypeChange(true); // 新增时强制设置默认工时
            G.modal.show();
        });
    }

    // ===== 编辑考勤弹窗 =====
    function openEditModal(id) {
        fetch('/attendance/get/' + id).then(r => r.json()).then(function(a) {
            document.getElementById('modalTitle').textContent = '编辑考勤';
            document.getElementById('attId').value = a.id;
            document.getElementById('attEmpId').value = a.employeeId;
            document.getElementById('attEmpName').value = G.empName;
            document.getElementById('attProjId').value = a.projectId || '';
            document.getElementById('attDate').value = a.workDate;
            document.getElementById('attType').value = a.attendanceType;
            document.getElementById('attHours').value = a.workHours || 8;
            document.getElementById('attRemark').value = a.remark || '';
            document.getElementById('attOvertimeType').value = a.overtimeType || '1';
            loadWorkHourConfigs(function() {
                onTypeChange(false); // 编辑时保持原有工时不覆盖
                G.modal.show();
            });
        });
    }

    function onTypeChange(forceDefault) {
        var t = document.getElementById('attType').value;
        document.getElementById('overtimeTypeWrap').style.display = (t === '2') ? 'block' : 'none';
        // 缺勤不需要工时
        document.getElementById('attHours').closest('.col-6').style.opacity = (t === '4') ? '0.4' : '1';
        // 根据工时配置设置默认工时（仅新增时强制设置，编辑时保持原值）
        if (forceDefault) {
            var dailyH = parseFloat(document.getElementById('attDailyHours').value) || 8;
            if (t === '1') document.getElementById('attHours').value = dailyH;
            if (t === '2') document.getElementById('attHours').value = 2;
            if (t === '3') document.getElementById('attHours').value = Math.max(dailyH / 2, 1);
            if (t === '5') document.getElementById('attHours').value = 0.5;
            if (t === '6') document.getElementById('attHours').value = dailyH;
        }
    }

    // ===== 保存考勤 =====
    function saveAttendance() {
        var type = parseInt(document.getElementById('attType').value);
        var payload = {
            id: document.getElementById('attId').value || null,
            employeeId: parseInt(document.getElementById('attEmpId').value),
            projectId: document.getElementById('attProjId').value ? parseInt(document.getElementById('attProjId').value) : null,
            workDate: document.getElementById('attDate').value,
            attendanceType: type,
            workHours: parseFloat(document.getElementById('attHours').value) || 8,
            remark: document.getElementById('attRemark').value,
            status: 2
        };
        if (type === 2) {
            var overtimeType = document.getElementById('attOvertimeType').value;
            if (!overtimeType) {
                toast('请选择加班类型', 'danger');
                return;
            }
            payload.overtimeType = parseInt(overtimeType);
        }

        if (!payload.workDate) { toast('请选择工作日期', 'danger'); return; }
        
        // 变更编辑模式下，只记录到日志表，不修改出勤表
        if (G.isEditMode) {
            if (payload.id) {
                // 编辑模式：记录编辑日志
                saveEditChangeLog(payload);
            } else {
                // 新增模式：记录新增日志
                saveAttendanceInEditMode(payload);
            }
            return;
        }

        fetch('/attendance/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(r => r.text()).then(function(res) {
            if (res === 'success') {
                G.modal.hide();
                G.selectedDate = payload.workDate;
                toast('保存成功', 'success');
                loadMonthData();
                loadAttendancePendingHint(); // 刷新未生效提示
            } else {
                toast(res, 'danger');
            }
        });
    }
    
    // ===== 保存编辑变更到日志（编辑模式）=====
    function saveEditChangeLog(payload) {
        // 获取原始数据
        var original = G.attendances.find(function(a) { return a.id == payload.id; });
        if (!original) {
            toast('未找到原始记录', 'danger');
            return;
        }
        
        // 检查是否有实际变化
        var oldWorkHours = original.workHours ? parseFloat(original.workHours) : null;
        var newWorkHours = payload.workHours ? parseFloat(payload.workHours) : null;
        // 备注比较：将 null 和空字符串视为相同
        var oldRemark = original.remark || '';
        var newRemark = payload.remark || '';
        var hasChange = original.attendanceType != payload.attendanceType
            || original.overtimeType != payload.overtimeType
            || oldWorkHours != newWorkHours
            || oldRemark !== newRemark;
        
        if (!hasChange) {
            toast('没有检测到变化，无需提交', 'warning');
            return;
        }
        
        var changeData = {
            attendanceId: payload.id,
            projectId: payload.projectId,
            employeeId: payload.employeeId,
            workDate: payload.workDate,
            yearMonth: G.yearMonth,
            changeType: 'EDIT',
            oldAttendanceType: original.attendanceType,
            oldOvertimeType: original.overtimeType,
            oldWorkHours: original.workHours ? parseFloat(original.workHours) : null,
            oldRemark: original.remark,
            newAttendanceType: payload.attendanceType,
            newOvertimeType: payload.overtimeType,
            newWorkHours: payload.workHours ? parseFloat(payload.workHours) : null,
            newRemark: payload.remark,
            changeReason: '编辑考勤记录',
            status: 0
        };
        
        fetch('/attendance/save-change-log', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(changeData)
        }).then(function(r) {
            if (!r.ok) throw new Error('保存失败');
            return r.json();
        }).then(function(result) {
            if (result.success) {
                G.modal.hide();
                G.selectedDate = payload.workDate;
                toast('已记录编辑操作，审批通过后生效。变更内容可点击"查看变更"按钮查看。', 'info');
                loadMonthData();
            } else {
                toast(result.message || '保存失败', 'danger');
            }
        }).catch(function(e) {
            toast('保存编辑记录失败: ' + e.message, 'danger');
        });
    }
    
    // ===== 保存考勤（变更编辑模式）- 只记录到change log，不修改出勤表 =====
    function saveAttendanceInEditMode(payload) {
        // 构建新增记录数据（只记录到日志，不保存到出勤表）
        var changeData = {

            projectId: payload.projectId,

            yearMonth: G.yearMonth,
            changeType: 'ADD',

            oldOvertimeType: null,
            oldWorkHours: null,
            oldRemark: null,
            newAttendanceType: payload.attendanceType,
            newOvertimeType: payload.overtimeType,
            newWorkHours: payload.workHours ? parseFloat(payload.workHours) : null,
            newRemark: payload.remark,
            changeReason: '新增考勤记录',
            status: 0
        };
        
        // 保存到change log
        fetch('/attendance/save-change-log', {

            if (!r.ok) throw new Error('保存失败');

        }).then(function(result) {

                loadMonthData();

                toast(result.message || '保存失败', 'danger');

    // ===== 工具函数 =====
    function fmtDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    // ===== 消息提示函数（Bootstrap Modal）=====
    function toast(msg, type) {
        var title = type === 'success' ? '成功' : type === 'danger' ? '错误' : '提示';
        var headerClass = type === 'success' ? 'bg-success text-white' : type === 'danger' ? 'bg-danger text-white' : 'bg-primary text-white';
        document.getElementById('msgModalTitle').textContent = title;
        document.getElementById('msgModalBody').textContent = msg;
        document.getElementById('msgModalHeader').className = 'modal-header py-2 ' + headerClass;
        G.msgModal.show();
    }

    // ==================== 月度考勤表状态管理 ====================
    
    // 当前月度状态
    G.monthStatus = 0; // 默认草稿
    G.monthStatusData = null;
    
    /**
     * 加载月度考勤状态
     */
    function loadMonthStatus() {
        var url = '/attendance/month/status?yearMonth=' + G.yearMonth + '&projectId=' + (G.projectId || '');
        fetch(url).then(r => r.json()).then(function(data) {
            console.log('月度状态数据:', data);
            G.monthStatus = parseInt(data.status !== undefined ? data.status : 0);
            G.monthStatusData = data;
            renderMonthStatus(data);
            updateUIBasedOnStatus(G.monthStatus);
        }).catch(function(err) {
            // 请求失败时，默认显示草稿状态和提交按钮
            console.log('加载月度状态失败:', err);
            var defaultData = {status: 0, statusText: '草稿', statusBadgeClass: 'bg-secondary'};
            G.monthStatus = 0;
            G.monthStatusData = defaultData;
            renderMonthStatus(defaultData);
            updateUIBasedOnStatus(0);
        });
    }
    
    /**
     * 渲染月度状态显示
     */
    function renderMonthStatus(data) {
        var badge = document.getElementById('monthStatusBadge');
        var tip = document.getElementById('monthStatusTip');
        var status = parseInt(data.status !== undefined ? data.status : 0);
        var statusText = data.statusText || '草稿';
        var statusBadgeClass = data.statusBadgeClass || 'bg-secondary';
        
        // 二次审批状态使用不同的背景颜色
        if (status === 5 && data.approveRemark) {
            if (data.approveRemark.includes('[二次审批通过')) {
                statusBadgeClass = 'bg-success'; // 通过保持绿色
            } else if (data.approveRemark.includes('[二次审批驳回')) {
                statusBadgeClass = 'bg-warning text-dark'; // 驳回使用黄色
            }
        }
            
        badge.className = 'badge ' + statusBadgeClass;
        badge.textContent = statusText;
            
        var roleCode = document.getElementById('currentRoleCode').value;
        var isBossOrRoot = (roleCode.toLowerCase() === 'boss' || roleCode.toLowerCase() === 'root');
        var approverName = data.approverName || 'BOSS';
            
        // 提示文案
        if (status === 1 && !isBossOrRoot) {
            // 非审批人：显示"等待 BOSS 审批"
            tip.textContent = '等待 BOSS 审批';
            tip.style.display = 'inline';
        } else if (status === 1 && isBossOrRoot) {
            // 审批人：提示有待审批记录
            tip.textContent = '有记录等待您审批';
            tip.style.display = 'inline';
        } else if ((status === 12 || status === 2) && data.approveRemark) {
            tip.textContent = '驳回原因：' + data.approveRemark;
            tip.style.display = 'inline';
        } else {
            tip.style.display = 'none';
        }
            
        // 提交审批按鈕：草稿(0)或已驳回(12)状态显示
        var btnSubmit = document.getElementById('btnSubmitAudit');
        btnSubmit.style.display = (status === 0 || status === 12) ? 'inline-block' : 'none';
            
        // 审批通过/驳回按鈕：审批人且待审批(1)时显示
        var btnPass = document.getElementById('btnApprovePass');
        var btnReject = document.getElementById('btnApproveReject');
        var showApproveBtn = isBossOrRoot && status === 1;
        btnPass.style.display = showApproveBtn ? 'inline-block' : 'none';
        btnReject.style.display = showApproveBtn ? 'inline-block' : 'none';
    }
    
    /**
     * 根据状态更新UI（控制编辑权限）
     */
    function updateUIBasedOnStatus(status) {
        status = parseInt(status);
        G.monthStatus = status;
        
        // 获取按钮元素
        var btnSubmitAudit = document.getElementById('btnSubmitAudit');
        var btnApplyChange = document.getElementById('btnApplyChange');
        var btnSubmitChanges = document.getElementById('btnSubmitChanges');
        var btnCancelChanges = document.getElementById('btnCancelChanges');
        var btnApprovePass = document.getElementById('btnApprovePass');
        var btnApproveReject = document.getElementById('btnApproveReject');
        var btnViewChanges = document.getElementById('btnViewChanges');
        var btnDownloadTemplate = document.getElementById('btnDownloadTemplate');
        var btnImportAttendance = document.getElementById('btnImportAttendance');
        var badge = document.getElementById('monthStatusBadge');
        
        // 隐藏所有按钮（默认）
        if (btnSubmitAudit) btnSubmitAudit.style.display = 'none';
        if (btnApplyChange) btnApplyChange.style.display = 'none';
        if (btnSubmitChanges) btnSubmitChanges.style.display = 'none';
        if (btnCancelChanges) btnCancelChanges.style.display = 'none';
        if (btnApprovePass) btnApprovePass.style.display = 'none';
        if (btnApproveReject) btnApproveReject.style.display = 'none';
        if (btnViewChanges) btnViewChanges.style.display = 'none';
        // 导出模板按钮任何状态下都显示
        if (btnDownloadTemplate) btnDownloadTemplate.style.display = 'inline-block';
        
        // 根据状态显示对应按钮
        switch (status) {
            case 0: // 草稿
                badge.className = 'badge bg-secondary';
                badge.textContent = '草稿';
                if (btnSubmitAudit) btnSubmitAudit.style.display = 'inline-block';
                if (btnImportAttendance) btnImportAttendance.style.display = 'inline-block';
                G.isEditMode = false;
                break;
                
            case 1: // 待审批
                badge.className = 'badge bg-warning text-dark';
                badge.textContent = '待审批';
                // BOSS/管理员显示审批按钮
                var roleCode = document.getElementById('currentRoleCode');
                var isBoss = roleCode && (roleCode.value.toLowerCase() === 'boss' || roleCode.value.toLowerCase() === 'root');
                if (isBoss) {
                    if (btnApprovePass) btnApprovePass.style.display = 'inline-block';
                    if (btnApproveReject) btnApproveReject.style.display = 'inline-block';
                    // 首次提交（没有变更日志）不显示查看变更按钮
                    if (btnViewChanges && G.monthStatusData && G.monthStatusData.hasChangeLogs) {
                        btnViewChanges.style.display = 'inline-block';
                    }
                }
                G.isEditMode = false;
                break;
                
            case 2: // 变更待审
                badge.className = 'badge bg-info';
                badge.textContent = '变更待审';
                if (btnSubmitChanges) btnSubmitChanges.style.display = 'inline-block';
                if (btnCancelChanges) btnCancelChanges.style.display = 'inline-block';
                if (btnViewChanges) btnViewChanges.style.display = 'inline-block'; // 提交人也能查看变更
                if (btnImportAttendance) btnImportAttendance.style.display = 'inline-block'; // 编辑模式下也显示导入
                G.isEditMode = true;
                break;
                
            case 5: // 已审批锁定
                badge.className = 'badge bg-success';
                // 状态文本已经在 renderMonthStatus 中设置，这里不再覆盖
                // badge.textContent = '已锁定';
                // 有权限的用户显示申请修改按钮
                var canEdit = document.getElementById('canAddAttendance').value === 'true';
                if (canEdit && btnApplyChange) {
                    btnApplyChange.style.display = 'inline-block';
                }
                G.isEditMode = false;
                break;
                
            case 12: // 已驳回
                badge.className = 'badge bg-danger';
                badge.textContent = '已驳回';
                if (btnSubmitAudit) btnSubmitAudit.style.display = 'inline-block';
                if (btnImportAttendance) btnImportAttendance.style.display = 'inline-block';
                G.isEditMode = false;
                break;
                
            default: // 未生成月度考勤表（状态为null或其他未知状态）
                badge.className = 'badge bg-secondary';
                badge.textContent = '草稿';
                if (btnSubmitAudit) btnSubmitAudit.style.display = 'inline-block';
                if (btnImportAttendance) btnImportAttendance.style.display = 'inline-block';
                G.isEditMode = false;
                break;
        }
        
        // 刷新详情面板
        if (G.selectedDate) {
            renderDetail(G.selectedDate);
        }
    }

    /**
     * 批量通过考勤修改
     */
    function batchApproveAttendanceChanges(monthRemark) {
        fetch('/attendance/api/batch-approve-changes?projectId=' + G.projectId + '&yearMonth=' + G.yearMonth + '&remark=' + encodeURIComponent(monthRemark), {
            method: 'POST'
        })
        .then(r => r.json())
        .then(function(data) {
            if (data.success) {
                // 考勤修改审批通过后，继续审批月份
                executeApproveMonth(true, monthRemark);
            } else {
                toast('审批考勤修改失败：' + data.message, 'danger');
            }
        })
        .catch(function(e) {
            toast('审批失败，请稍后重试', 'danger');
        });
    }
    
    /**
     * 批量驳回考勤修改
     */
    function batchRejectAttendanceChanges(monthRemark) {
        // 先驳回所有考勤修改，然后驳回月份审批
        fetch('/attendance/api/change-logs?projectId=' + G.projectId + '&yearMonth=' + G.yearMonth)
            .then(r => r.json())
            .then(function(data) {
                var pendingLogs = (data.logs || []).filter(function(l) { return l.status === 0; });
                var rejectPromises = pendingLogs.map(function(log) {
                    return fetch('/attendance/api/reject-change?changeLogId=' + log.id + '&remark=' + encodeURIComponent('月份审批被驳回'), {
                        method: 'POST'
                    });
                });
                return Promise.all(rejectPromises);
            })
            .then(function() {
                // 驳回考勤修改后，继续驳回月份
                executeApproveMonth(false, monthRemark);
            })
            .catch(function(e) {
                toast('驳回失败，请稍后重试', 'danger');
            });
    }
    
    /**
     * 执行月份审批
     */
    function executeApproveMonth(approved, remark) {
        var params = new URLSearchParams();
        params.append('yearMonth', G.yearMonth);
        params.append('projectId', G.projectId || '');
        params.append('approved', approved);
        params.append('remark', remark || '');
        fetch('/attendance/month/approve', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: params
        }).then(r => r.text()).then(function(res) {
            if (res === 'success') {
                toast(approved ? '审批通过！' : '已驳回', 'success');
                loadMonthStatus();
                loadMonthData(); // 刷新日历数据
                loadAllEmpDays(); // 刷新左侧员工列表徽章
                loadAttendancePendingHint(); // 刷新待审批项目提示
                refreshAttendanceBadge();   // 刷新左侧菜单徽章
            } else {
                toast(res, 'danger');
            }
        });
    }

    /**
     * 导入考勤数据
     */
    function importAttendance(input) {
        if (!G.projectId) {
            toast('请先选择项目', 'danger');
            input.value = '';
            return;
        }
        
        var file = input.files[0];
        if (!file) return;
        
        // 检查文件类型
        var fileName = file.name.toLowerCase();
        if (!fileName.endsWith('.xlsx') && !fileName.endsWith('.xls')) {
            toast('请选择Excel文件（.xlsx或.xls）', 'danger');
            input.value = '';
            return;
        }
        
        var formData = new FormData();
        formData.append('file', file);
        formData.append('projectId', G.projectId);
        formData.append('yearMonth', G.yearMonth);
        
        fetch('/attendance/import', {
            method: 'POST',
            body: formData
        }).then(r => r.json()).then(function(res) {
            input.value = '';
            if (res.success) {
                toast(res.message, 'success');
                // 刷新页面数据
                loadMonthData();
                loadAllEmpDays();
            } else {
                toast(res.message, 'danger');
            }
            if (res.errors && res.errors.length > 0) {
                console.log('导入错误详情：', res.errors);
            }
        }).catch(function(err) {
            input.value = '';
            toast('导入失败：' + err.message, 'danger');
        });
    }
