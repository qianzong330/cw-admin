<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout('考勤审批', ~{::#mainContent})}">
<head>
    <meta charset="UTF-8">
    <style>
        .filter-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .page-title {
            color: #fff;
            font-weight: 600;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div id="mainContent">
        <!-- 顶部标题栏 -->
        <div class="filter-bar">
            <div class="d-flex justify-content-between align-items-center">
                <div class="page-title">
                    <i class="bi bi-calendar-check me-2"></i>考勤审批
                    <span class="badge bg-warning text-dark ms-2"
                          th:text="${#lists.size(pendingList)} + ' 条待审批'">0 条待审批</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <!-- 空状态 -->
                <div th:if="${#lists.isEmpty(pendingList)}" class="text-center text-muted py-5">
                    <i class="bi bi-check-circle fs-1 text-success"></i>
                    <p class="mt-2">暂无待审批的考勤表</p>
                </div>

                <!-- 待审批列表 -->
                <div th:if="${!#lists.isEmpty(pendingList)}" class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>年月</th>
                                <th>项目</th>
                                <th>状态</th>
                                <th>提交人</th>
                                <th>提交时间</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${pendingList}">
                                <td th:text="${item.yearMonth}">2026-03</td>
                                <td th:text="${item.projectName} ?: '全部项目'">项目名称</td>
                                <td>
                                    <span class="badge bg-warning text-dark">待审批</span>
                                </td>
                                <td th:text="${item.submitByName} ?: '-'">提交人</td>
                                <td th:text="${#temporals.format(item.submitTime, 'yyyy-MM-dd HH:mm')}">2026-03-01 10:00</td>
                                <td th:text="${item.submitRemark} ?: '-'"></td>
                                <td style="white-space:nowrap;">
                                    <button type="button" class="btn btn-success btn-sm"
                                            th:data-year-month="${item.yearMonth}"
                                            th:data-project-id="${item.projectId}"
                                            onclick="approveMonth(this.getAttribute('data-year-month'), this.getAttribute('data-project-id'))">
                                        <i class="bi bi-check-lg"></i> 通过
                                    </button>
                                    <button type="button" class="btn btn-danger btn-sm ms-1"
                                            th:data-year-month="${item.yearMonth}"
                                            th:data-project-id="${item.projectId}"
                                            onclick="rejectMonth(this.getAttribute('data-year-month'), this.getAttribute('data-project-id'))">
                                        <i class="bi bi-x-lg"></i> 驳回
                                    </button>
                                    <button type="button" class="btn btn-outline-primary btn-sm ms-1"
                                            th:data-year-month="${item.yearMonth}"
                                            th:data-project-id="${item.projectId}"
                                            onclick="previewAttendance(this.getAttribute('data-year-month'), this.getAttribute('data-project-id'))">
                                        <i class="bi bi-eye"></i> 查看
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 驳回备注弹窗 -->
        <div class="modal fade" id="rejectModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="bi bi-x-circle text-danger me-2"></i>驳回考勤表</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">驳回原因 <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="rejectRemark" rows="3" placeholder="请填写驳回原因，提交人将看到此内容"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-danger" onclick="confirmReject()">确认驳回</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 查看考勤表弹窗 -->
        <div class="modal fade" id="previewModal" tabindex="-1">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="bi bi-calendar-check me-2"></i>查看考勤表</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <iframe id="previewFrame" style="width:100%; height:600px; border:none;"></iframe>
                    </div>
                </div>
            </div>
        </div>

        <script>
            var pendingRejectYearMonth = null;
            var pendingRejectProjectId = null;

            function previewAttendance(yearMonth, projectId) {
                var url = '/attendance/list?yearMonth=' + yearMonth;
                if (projectId && projectId !== 'null') {
                    url += '&projectId=' + projectId;
                }
                document.getElementById('previewFrame').src = url;
                new bootstrap.Modal(document.getElementById('previewModal')).show();
            }

            function approveMonth(yearMonth, projectId) {
                if (!confirm('确认通过 ' + yearMonth + ' 的考勤表审批？通过后考勤表将被锁定。')) return;
                var pid = (projectId === 'null' || projectId === '') ? null : projectId;
                doApprove(yearMonth, pid, true, '');
            }

            function rejectMonth(yearMonth, projectId) {
                pendingRejectYearMonth = yearMonth;
                pendingRejectProjectId = (projectId === 'null' || projectId === '') ? null : projectId;
                document.getElementById('rejectRemark').value = '';
                new bootstrap.Modal(document.getElementById('rejectModal')).show();
            }

            function confirmReject() {
                var remark = document.getElementById('rejectRemark').value.trim();
                if (!remark) {
                    alert('请填写驳回原因');
                    return;
                }
                bootstrap.Modal.getInstance(document.getElementById('rejectModal')).hide();
                doApprove(pendingRejectYearMonth, pendingRejectProjectId, false, remark);
            }

            function doApprove(yearMonth, projectId, approved, remark) {
                var params = new URLSearchParams();
                params.append('yearMonth', yearMonth);
                if (projectId !== null && projectId !== 'null') {
                    params.append('projectId', projectId);
                }
                params.append('approved', approved);
                params.append('remark', remark);

                fetch('/attendance/month/approve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: params
                }).then(r => r.text()).then(function(res) {
                    if (res === 'success') {
                        alert(approved ? '审批通过，考勤表已锁定' : '已驳回');
                        location.reload();
                    } else {
                        alert('操作失败：' + res);
                    }
                });
            }
        </script>
    </div>
