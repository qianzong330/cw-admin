<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(${category.id} ? '编辑费用分类' : '新增费用分类', ~{::content})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0" th:text="${category.id} ? '编辑费用分类' : '新增费用分类'">新增费用分类</h5>
            </div>
            <div class="card-body">
                <form action="/category/save" method="post" th:object="${category}">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">费用分类名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="/category/list" class="btn btn-secondary">返回</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
