<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout('项目统计', ~{::div})}">
<head>
    <meta charset="UTF-8">
    <title>项目统计</title>
    <style>
        /* 移动端优化 */
        @media (max-width: 768px) {
            .stats-header {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 12px !important;
                padding: 12px !important;
            }
            .stats-header h5 {
                font-size: 15px;
                text-align: left;
                white-space: normal;
                line-height: 1.4;
                margin-bottom: 8px;
            }
            .stats-actions {
                display: grid !important;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 8px !important;
            }
            .stats-actions select {
                grid-column: 1 / -1;
                width: 100% !important;
                margin-bottom: 4px;
            }
            .stats-actions .btn {
                padding: 8px 4px;
                font-size: 12px;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div>
        <div class="card">
            <div class="card-header stats-header">
                <!-- 第一行：标题和时间筛选 -->
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                    <h5 class="mb-0" th:text="${project.name} + ' - 收支统计'">项目统计</h5>
                    <select class="form-select form-select-sm" style="width: auto; min-width: 100px;" id="timeRangeSelect" onchange="onTimeRangeChange()">
                        <option value="" th:selected="${timeRange == null || timeRange == ''}">全部时间</option>
                        <option value="week" th:selected="${timeRange == 'week'}">本周</option>
                        <option value="month" th:selected="${timeRange == 'month'}">本月</option>
                        <option value="quarter" th:selected="${timeRange == 'quarter'}">本季度</option>
                        <option value="halfYear" th:selected="${timeRange == 'halfYear'}">近半年</option>
                        <option value="year" th:selected="${timeRange == 'year'}">近一年</option>
                        <option value="twoYears" th:selected="${timeRange == 'twoYears'}">近两年</option>
                        <option value="threeYears" th:selected="${timeRange == 'threeYears'}">近三年</option>
                    </select>
                </div>
                <!-- 第二行：操作按钮 -->
                <div class="stats-actions d-flex align-items-center gap-2 flex-wrap">
                    <a th:href="@{/account/add(projectId=${project.id})}" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-plus-lg"></i> 记账
                    </a>
                    <a th:href="@{/account/pending}" class="btn btn-outline-success btn-sm">
                        <i class="bi bi-check-circle"></i> 审批
                    </a>
                    <a href="/index" class="btn btn-outline-secondary btn-sm">返回</a>
                </div>
            </div>
            <div class="card-body">
                <!-- 统计卡片 -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card bg-success text-white">
                            <div class="card-body text-center">
                                <h6>总收入</h6>
                                <h4 th:text="'¥' + ${#numbers.formatDecimal(stats?.income ?: 0, 1, 2)}">¥0.00</h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card bg-danger text-white">
                            <div class="card-body text-center">
                                <h6>总支出</h6>
                                <h4 th:text="'¥' + ${#numbers.formatDecimal(stats?.expense ?: 0, 1, 2)}">¥0.00</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 图表和排行榜区域 -->
                <div class="row">
                    <!-- 收入占比饼图 -->
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header bg-success text-white">
                                <h6 class="mb-0"><i class="bi bi-pie-chart"></i> 收入占比</h6>
                            </div>
                            <div class="card-body">
                                <canvas id="incomePieChart" style="max-height: 250px;"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- 收入TOP5分类 -->
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header bg-success text-white">
                                <h6 class="mb-0"><i class="bi bi-trophy"></i> 收入TOP5分类</h6>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-sm table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-3">排名</th>
                                            <th>费用分类</th>
                                            <th class="text-end pe-3">金额</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item, iterStat : ${incomeByCategory}">
                                            <td class="ps-3">
                                                <span class="badge" th:classappend="${iterStat.index == 0} ? 'bg-warning' : (${iterStat.index == 1} ? 'bg-secondary' : (${iterStat.index == 2} ? 'bg-info' : 'bg-light text-dark'))" th:text="${iterStat.index + 1}">1</span>
                                            </td>
                                            <td th:text="${item.categoryName} ?: '未分类'">分类名</td>
                                            <td class="text-end pe-3 text-success fw-bold" th:text="'¥' + ${#numbers.formatDecimal(item.amount, 1, 2)}">¥0.00</td>
                                        </tr>
                                        <tr th:if="${incomeByCategory == null || incomeByCategory.isEmpty()}">
                                            <td colspan="3" class="text-center text-muted py-3">暂无数据</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <!-- 支出TOP5分类 -->
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header bg-danger text-white">
                                <h6 class="mb-0"><i class="bi bi-trophy"></i> 支出TOP5分类</h6>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-sm table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-3">排名</th>
                                            <th>费用分类</th>
                                            <th class="text-end pe-3">金额</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item, iterStat : ${expenseByCategory}">
                                            <td class="ps-3">
                                                <span class="badge" th:classappend="${iterStat.index == 0} ? 'bg-warning' : (${iterStat.index == 1} ? 'bg-secondary' : (${iterStat.index == 2} ? 'bg-info' : 'bg-light text-dark'))" th:text="${iterStat.index + 1}">1</span>
                                            </td>
                                            <td th:text="${item.categoryName} ?: '未分类'">分类名</td>
                                            <td class="text-end pe-3 text-danger fw-bold" th:text="'¥' + ${#numbers.formatDecimal(item.amount, 1, 2)}">¥0.00</td>
                                        </tr>
                                        <tr th:if="${expenseByCategory == null || expenseByCategory.isEmpty()}">
                                            <td colspan="3" class="text-center text-muted py-3">暂无数据</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            // 收入分类数据
            var incomeByCategory = [[${incomeByCategory}]];
            var incomeLabels = incomeByCategory.map(item => item.categoryName || '未分类');
            var incomeData = incomeByCategory.map(item => item.amount);
            
            // 生成随机颜色
            function generateColors(count) {
                var colors = ['#198754', '#0d6efd', '#6f42c1', '#d63384', '#fd7e14', '#20c997', '#0dcaf0', '#ffc107'];
                var result = [];
                for (var i = 0; i < count; i++) {
                    result.push(colors[i % colors.length]);
                }
                return result;
            }
            
            // 收入占比饼图
            var pieCtx = document.getElementById('incomePieChart').getContext('2d');
            new Chart(pieCtx, {
                type: 'pie',
                data: {
                    labels: incomeLabels,
                    datasets: [{
                        data: incomeData,
                        backgroundColor: generateColors(incomeData.length),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                font: {
                                    size: 11
                                }
                            }
                        }
                    }
                }
            });
            
            // 时间范围切换
            function onTimeRangeChange() {
                var timeRange = document.getElementById('timeRangeSelect').value;
                var url = new URL(window.location.href);
                if (timeRange) {
                    url.searchParams.set('timeRange', timeRange);
                } else {
                    url.searchParams.delete('timeRange');
                }
                window.location.href = url.toString();
            }
        </script>
    </div>
</body>
</html>
